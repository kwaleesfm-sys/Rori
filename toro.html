<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMOS BET MAX - FIX V11</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --glass: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --info: #3b82f6;
            --text-main: #ffffff;
            --neon-blue: 0 0 15px rgba(59, 130, 246, 0.6);
            --neon-red: 0 0 15px rgba(239, 68, 68, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #020617; color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* شريط الأخبار البطيء */
        .ticker-wrap { background: #000; width: 100%; overflow: hidden; border-bottom: 1px solid var(--glass-border); padding: 12px 0; color: var(--success); font-weight: bold; font-size: 0.9rem; white-space: nowrap; }
        .ticker-move { display: inline-block; padding-right: 100%; animation: scroll-rtl 45s linear infinite; }
        @keyframes scroll-rtl { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        header { background: var(--glass); backdrop-filter: blur(20px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000; }
        .logo-box h1 { font-size: 1.5rem; font-weight: 900; }
        .logo-box span { color: var(--primary); }

        .status-container { background: var(--glass); margin: 15px 20px; padding: 15px; border-radius: 20px; border: 1px solid var(--glass-border); }
        .progress-bar { width: 100%; height: 10px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        #globalFill { height: 100%; width: 50%; background: linear-gradient(90deg, var(--info), var(--success)); transition: 1.5s ease; }

        /* التبويبات - التأكد من أنها تعمل */
        .nav-tabs { display: flex; background: var(--glass); margin: 0 20px 15px; padding: 6px; border-radius: 50px; border: 1px solid var(--glass-border); gap: 5px; }
        .tab-item { flex: 1; text-align: center; padding: 10px; border-radius: 50px; cursor: pointer; font-weight: bold; color: rgba(255,255,255,0.5); font-size: 0.8rem; }
        .tab-item.active { background: var(--primary); color: #000; }

        .content-sec { display: none; padding: 0 20px 100px; }
        .content-sec.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الألواح */
        .board-container { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; border: 1px solid var(--glass-border); }
        .apple-row { display: grid; grid-template-columns: 45px repeat(5, 1fr); gap: 6px; align-items: center; margin-bottom: 6px; }
        .multiplier-tag { font-size: 0.7rem; color: var(--primary); font-weight: 900; text-align: center; }
        .cell { aspect-ratio: 1; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        /* تلوين الجواهر */
        .safe-highlight { background: rgba(59, 130, 246, 0.2) !important; border: 2px solid var(--info) !important; box-shadow: var(--neon-blue); }
        .risk-highlight { background: rgba(239, 68, 68, 0.2) !important; border: 2px solid var(--danger) !important; box-shadow: var(--neon-red); }
        .highlight { background: rgba(16, 185, 129, 0.15); border: 2px solid var(--success) !important; }

        .console-box { background: #000; color: #10b981; font-family: monospace; font-size: 0.75rem; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: none; direction: ltr; text-align: left; }
        .action-btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-bottom: 10px; }
        .primary-btn { background: var(--primary); color: #000; }

        /* القسائم */
        .slip-card { background: var(--glass); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
        .blue-glow { border-color: var(--info); box-shadow: var(--neon-blue); }
        .green-glow { border-color: var(--success); }
        .safety-tag { position: absolute; top: 0; left: 0; padding: 2px 12px; font-size: 0.65rem; font-weight: bold; border-bottom-right-radius: 12px; }
        .safe-bg { background: var(--success); color: #fff; }
        .risk-bg { background: var(--danger); color: #fff; }
        .copy-btn { background: #334155; color: white; padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

        #adminPanel { display: none; background: rgba(239, 68, 68, 0.05); border: 1px dashed var(--danger); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: #0f172a; color: #fff; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>

    <div class="ticker-wrap"><div class="ticker-move" id="tickerUI">⚡ جاري الاتصال بالسيرفر...</div></div>

    <header>
        <div class="logo-box"><h1>HOMOS <span>MAX</span></h1></div>
        <i class="fas fa-fingerprint" id="authBtn" style="font-size: 1.5rem; color: var(--glass-border); cursor: pointer;"></i>
    </header>

    <div class="status-container">
        <div class="progress-bar"><div id="globalFill"></div></div>
    </div>

    <div class="nav-tabs">
        <div class="tab-item active" data-sec="apple-sec">🎯 Apple</div>
        <div class="tab-item" data-sec="mines-sec">💎 Mines</div>
        <div class="tab-item" data-sec="slips-sec">🗝️ Slips</div>
    </div>

    <!-- Apple Section -->
    <section class="content-sec active" id="apple-sec">
        <button class="action-btn primary-btn" id="runApple">تشغيل إسكربت التفاحة</button>
        <div class="console-box" id="conApple"></div>
        <div class="board-container" id="appleBoard"></div>
        <button class="action-btn" id="expApple" style="display:none; background:#fff; color:#000; margin-top:10px;"><i class="fab fa-tiktok"></i> تصوير الأرباح</button>
    </section>

    <!-- Mines Section (تم إصلاح التشغيل هنا) -->
    <section class="content-sec" id="mines-sec">
        <button class="action-btn primary-btn" id="runMines">كشف 9 جواهر متوقعة</button>
        <div class="console-box" id="conMines"></div>
        <div class="board-container" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px;" id="minesBoard"></div>
        <div id="msgMines" style="padding:10px; text-align:center; font-size:0.8rem; color:var(--info);">🔵 الأزرق: آمن | 🔴 الأحمر: مخاطرة</div>
        <button class="action-btn" id="expMines" style="display:none; background:#fff; color:#000; margin-top:10px;"><i class="fab fa-tiktok"></i> تصوير الأرباح</button>
    </section>

    <!-- Slips Section -->
    <section class="content-sec" id="slips-sec">
        <div id="adminPanel">
            <input type="text" id="appInp" class="admin-input" placeholder="التطبيق (1xbet / linebet)">
            <input type="text" id="codeInp" class="admin-input" placeholder="الكود">
            <select id="safeSelect" class="admin-input"><option value="safe">آمنة ✅</option><option value="risk">مخاطرة ⚠️</option></select>
            <button id="addSlip" class="action-btn" style="background:var(--success); color:#fff;">نشر القسيمة</button>
        </div>
        <div id="slipsList"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5fbIJ3rbV5Ud1mnQgZGTcjYZSrnQqNbA",
            authDomain: "fir-cb754.firebaseapp.com",
            databaseURL: "https://fir-cb754-default-rtdb.firebaseio.com",
            projectId: "fir-cb754",
            storageBucket: "fir-cb754.firebasestorage.app",
            messagingSenderId: "14696382194",
            appId: "1:14696382194:web:c3879f894094d67eae1a6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // نظام التبويبات
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content-sec').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.sec).classList.add('active');
                if(tab.dataset.sec === 'mines-sec') initM();
            };
        });

        // الأدمن
        let isAdmin = localStorage.getItem('homosAdmin') === 'true';
        if(isAdmin) document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('authBtn').onclick = () => {
            if(!isAdmin && prompt("Pass:") === "Homos77#") { localStorage.setItem('homosAdmin', 'true'); location.reload(); }
            else if(isAdmin && confirm("Logout?")) { localStorage.removeItem('homosAdmin'); location.reload(); }
        };

        // Apple Logic
        const mults = ["x1.23", "x1.54", "x1.93", "x2.41", "x4.02", "x6.71", "x11.18", "x27.9", "x69.8", "x349"];
        function initA() {
            const b = document.getElementById('appleBoard'); b.innerHTML = '';
            for(let i=9; i>=0; i--) {
                let r = document.createElement('div'); r.className='apple-row';
                r.innerHTML = `<div class="multiplier-tag">${mults[i]}</div>`;
                for(let j=0; j<5; j++) r.innerHTML += `<div class="cell" id="a-${i}-${j}"></div>`;
                b.appendChild(r);
            }
        }
        initA();

        document.getElementById('runApple').onclick = () => {
            initA(); document.getElementById('conApple').style.display='block';
            document.getElementById('conApple').innerHTML = "> Scanning Apple Matrix...";
            let l = 0;
            let timer = setInterval(() => {
                if(l > 9) { clearInterval(timer); document.getElementById('expApple').style.display='block'; return; }
                document.getElementById(`a-${l}-${Math.floor(Math.random()*5)}`).innerHTML = '🍎';
                document.getElementById(`a-${l}-${Math.floor(Math.random()*5)}`).classList.add('highlight');
                l++;
            }, 300);
        };

        // Mines Logic
        function initM() {
            const b = document.getElementById('minesBoard'); b.innerHTML = '';
            for(let i=0; i<25; i++) b.innerHTML += `<div class="cell" id="m-${i}"></div>`;
        }
        initM();

        document.getElementById('runMines').onclick = () => {
            initM(); let lastM = [];
            document.getElementById('conMines').style.display='block';
            document.getElementById('conMines').innerHTML = "> Decoding Mines Grid...";
            let found = 0;
            let timer = setInterval(() => {
                if(found >= 9) { clearInterval(timer); document.getElementById('expMines').style.display='block'; return; }
                let idx; do { idx = Math.floor(Math.random()*25); } while(lastM.includes(idx));
                lastM.push(idx);
                let c = document.getElementById(`m-${idx}`);
                if(found < 3) c.classList.add('safe-highlight'); else c.classList.add('risk-highlight');
                c.innerHTML = '💎';
                found++;
            }, 400);
        };

        // Slips & Ticker
        onValue(ref(db, 'live_ticker'), (snap) => {
            let d = snap.val(), s = "";
            if(d) Object.values(d).reverse().slice(0,5).forEach(i => s += ` &nbsp;&nbsp;&nbsp;&nbsp; 🔥 ${i.text} &nbsp;&nbsp;&nbsp;&nbsp; | `);
            document.getElementById('tickerUI').innerHTML = s + s;
        });

        onValue(ref(db, 'pro_slips'), (snap) => {
            const list = document.getElementById('slipsList'); list.innerHTML = '';
            let d = snap.val();
            if(d) Object.keys(d).reverse().forEach(k => {
                let s = d[k];
                let glow = s.appName.toLowerCase().includes('1x') ? 'blue-glow' : 'green-glow';
                let tag = s.safety === 'safe' ? 'safe-bg' : 'risk-bg';
                let tagT = s.safety === 'safe' ? 'آمنة ✅' : 'مخاطرة ⚠️';
                let del = isAdmin ? `<button style="color:red; background:none; border:none; margin-left:10px;" onclick="window.delSlip('${k}')"><i class="fas fa-trash"></i></button>` : '';
                list.innerHTML += `<div class="slip-card ${glow}"><div class="safety-tag ${tag}">${tagT}</div><h3>${s.appName.toUpperCase()}</h3><div>${del}<button class="copy-btn" onclick="navigator.clipboard.writeText('${s.code}'); alert('تم النسخ')">${s.code}</button></div></div>`;
            });
        });

        // تصوير الشاشة
        window.snap = (id) => { html2canvas(document.getElementById(id), {backgroundColor:'#020617'}).then(c => { let a=document.createElement('a'); a.download='HOMOS.png'; a.href=c.toDataURL(); a.click(); }); };
        document.getElementById('expApple').onclick = () => snap('appleBoard');
        document.getElementById('expMines').onclick = () => snap('minesBoard');

        // أدمن Actions
        document.getElementById('addSlip').onclick = () => {
            let a=document.getElementById('appInp').value, c=document.getElementById('codeInp').value, s=document.getElementById('safeSelect').value;
            if(a && c) push(ref(db, 'pro_slips'), {appName:a, code:c, safety:s});
        };
        window.delSlip = (k) => { if(confirm("حذف؟")) remove(ref(db, `pro_slips/${k}`)); };
    </script>
</body>
</html>
