<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winnix | Firebase Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; user-select: none; }
        .glass { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); }
        .mine-box { transition: all 0.2s; }
        .mine-box.revealed { transform: scale(0.95); opacity: 0.8; pointer-events: none; }
    </style>
</head>
<body class="pb-24">

    <div id="authView" class="fixed inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center p-6">
        <h1 class="text-5xl font-black text-blue-500 italic mb-8">WINNIX</h1>
        <div class="w-full max-w-sm space-y-4">
            <input type="email" id="emailInput" class="w-full bg-slate-900 p-4 rounded-xl text-center outline-none border border-slate-800" placeholder="البريد الإلكتروني">
            <input type="password" id="passInput" class="w-full bg-slate-900 p-4 rounded-xl text-center outline-none border border-slate-800" placeholder="كلمة المرور">
            <button id="loginBtn" class="w-full bg-blue-600 py-4 rounded-xl font-black text-lg">تسجيل الدخول / إنشاء حساب</button>
        </div>
    </div>

    <header id="appHeader" class="fixed top-0 w-full glass z-40 p-4 flex justify-between items-center hidden border-b border-white/5">
        <div class="flex flex-col">
            <span id="userEmailDisplay" class="text-[10px] text-slate-400"></span>
            <button id="adminBtn" class="hidden text-xs text-amber-500 font-bold mt-1"><i class="fa-solid fa-crown"></i> لوحة الإدارة</button>
        </div>
        <div class="flex items-center gap-2 bg-slate-900 p-2 rounded-xl">
            <span id="balanceDisplay" class="font-black text-green-500 text-lg">0.00</span>
            <span class="text-[10px] text-slate-500">EGP</span>
            <button onclick="ui.showModal('depositModal')" class="bg-green-600 w-8 h-8 rounded flex items-center justify-center"><i class="fa-solid fa-plus"></i></button>
        </div>
    </header>

    <main id="mainApp" class="pt-24 px-4 hidden">
        <div class="bg-slate-900 p-6 rounded-3xl border border-white/5 text-center mb-6">
            <h3 class="font-black text-red-500 mb-4 text-xl">لعبة التأديب (الألغام) 💣</h3>
            <p class="text-xs text-slate-400 mb-4">25 صندوق | قنبلتان فقط</p>
            
            <div id="minesGrid" class="grid grid-cols-5 gap-2 mb-6"></div>
            
            <div class="flex justify-between items-center bg-slate-950 p-4 rounded-xl mb-4 border border-slate-800">
                <div class="text-right">
                    <span class="text-[10px] text-slate-500 block">المضاعف الحالي</span>
                    <span id="minesMult" class="font-black text-blue-500 text-lg">1.00x</span>
                </div>
                <div class="text-left">
                    <span class="text-[10px] text-slate-500 block">الربح المحتمل</span>
                    <span id="minesPot" class="font-black text-green-500 text-lg">0.00</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3" id="minesControls">
                <input type="number" id="minesBet" value="10" class="bg-slate-950 p-3 rounded-xl text-center font-bold outline-none border border-slate-800">
                <button onclick="games.mines.start()" class="bg-blue-600 rounded-xl font-black">بدء الجولة</button>
            </div>
        </div>
    </main>

    <div id="depositModal" class="fixed inset-0 bg-black/90 z-50 hidden flex-col items-center justify-center p-6">
        <div class="bg-slate-900 w-full max-w-sm p-6 rounded-3xl border border-slate-700">
            <h3 class="font-black text-xl mb-4 text-center">إيداع ڤودافون كاش</h3>
            <div class="bg-slate-950 p-4 rounded-xl mb-4 flex justify-between items-center border border-slate-800">
                <span class="font-black text-lg tracking-wider" id="vCashNum">01014879247</span>
                <button onclick="navigator.clipboard.writeText('01014879247'); alert('تم النسخ!')" class="text-blue-500"><i class="fa-solid fa-copy text-xl"></i></button>
            </div>
            <p class="text-[10px] text-amber-500 text-center mb-4">* الحد الأدنى للإيداع 15 جنيه</p>
            
            <input type="number" id="depAmount" placeholder="المبلغ المحول" class="w-full bg-slate-950 p-3 rounded-xl text-center mb-3 outline-none">
            <input type="text" id="depPhone" placeholder="رقم الموبايل اللي حولت منه" class="w-full bg-slate-950 p-3 rounded-xl text-center mb-3 outline-none">
            
            <label class="block bg-slate-950 p-3 rounded-xl text-center mb-4 border border-dashed border-slate-600 cursor-pointer text-sm">
                <i class="fa-solid fa-image text-slate-400 mr-2"></i> ارفع سكرين التحويل
                <input type="file" id="depImage" class="hidden" accept="image/*">
            </label>
            
            <button id="submitDepositBtn" class="w-full bg-green-600 py-3 rounded-xl font-black mb-2">تأكيد الطلب</button>
            <button onclick="ui.hideModal('depositModal')" class="w-full text-slate-500 text-sm font-bold">إلغاء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Your Config
        const firebaseConfig = {
            apiKey: "AIzaSyB5fbIJ3rbV5Ud1mnQgZGTcjYZSrnQqNbA",
            authDomain: "fir-cb754.firebaseapp.com",
            databaseURL: "https://fir-cb754-default-rtdb.firebaseio.com",
            projectId: "fir-cb754",
            storageBucket: "fir-cb754.firebasestorage.app",
            messagingSenderId: "14696382194",
            appId: "1:14696382194:web:c3879f894094d67eae1a6b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const ADMIN_EMAIL = "ahmedfouad01278837444@gmail.com";
        let currentUser = null;
        let userBalance = 0;
        let base64Image = null;

        // UI Helpers attached to window so inline HTML onclicks work
        window.ui = {
            showModal: (id) => { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); },
            hideModal: (id) => { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); },
        };

        // --- AUTHENTICATION ---
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passInput').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                if(error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    // Auto Register if not found
                    try {
                        const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                        await set(ref(db, 'users/' + userCred.user.uid), { balance: 0, email: email });
                    } catch(e) { alert(e.message); }
                } else { alert("خطأ في تسجيل الدخول"); }
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authView').classList.add('hidden');
                document.getElementById('appHeader').classList.remove('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userEmailDisplay').innerText = user.email;

                if(user.email === ADMIN_EMAIL) {
                    document.getElementById('adminBtn').classList.remove('hidden');
                    // Add Admin Panel Logic here later
                }

                // Listen to Balance
                onValue(ref(db, 'users/' + user.uid + '/balance'), (snapshot) => {
                    userBalance = snapshot.val() || 0;
                    document.getElementById('balanceDisplay').innerText = userBalance.toFixed(2);
                });
            } else {
                document.getElementById('authView').classList.remove('hidden');
            }
        });

        // --- IMAGE COMPRESSION TO BASE64 ---
        document.getElementById('depImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    // Compress to max width 500px
                    const MAX_WIDTH = 500;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Image = canvas.toDataURL('image/jpeg', 0.5); // 50% Quality
                    alert("تم ضغط الصورة وتجهيزها بنجاح!");
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // --- DEPOSIT REQUEST ---
        document.getElementById('submitDepositBtn').addEventListener('click', async () => {
            const amount = parseFloat(document.getElementById('depAmount').value);
            const phone = document.getElementById('depPhone').value;
            
            if(amount < 15) return alert("أقل مبلغ للإيداع هو 15 جنيه");
            if(!phone || !base64Image) return alert("يرجى إدخال الرقم ورفع الإيصال");

            const reqRef = push(ref(db, 'deposits'));
            await set(reqRef, {
                uid: currentUser.uid,
                email: currentUser.email,
                amount: amount,
                phone: phone,
                receiptBase64: base64Image,
                status: 'pending',
                timestamp: Date.now()
            });

            alert("تم إرسال طلب الإيداع للآدمن للمراجعة!");
            ui.hideModal('depositModal');
            document.getElementById('depAmount').value = '';
            document.getElementById('depPhone').value = '';
            base64Image = null;
        });

        // --- MINES GAME LOGIC (التأديب) ---
        window.games = {
            mines: {
                active: false, bet: 0, mult: 1.0, safePicks: 0, bombs: [],
                init() {
                    const grid = document.getElementById('minesGrid');
                    grid.innerHTML = '';
                    for(let i=0; i<25; i++) {
                        grid.innerHTML += `<div id="box_${i}" onclick="games.mines.pick(${i})" class="bg-slate-800 aspect-square rounded-lg flex items-center justify-center text-2xl cursor-pointer border border-slate-700 mine-box">❓</div>`;
                    }
                },
                async start() {
                    if(this.active) return;
                    const betAmt = parseFloat(document.getElementById('minesBet').value);
                    if(betAmt <= 0 || userBalance < betAmt) return alert("رصيد غير كافي");
                    
                    // Deduct balance from Firebase
                    const newBal = userBalance - betAmt;
                    await update(ref(db, 'users/' + currentUser.uid), { balance: newBal });
                    
                    this.bet = betAmt; this.mult = 1.0; this.safePicks = 0; this.active = true;
                    document.getElementById('minesMult').innerText = "1.00x";
                    document.getElementById('minesPot').innerText = betAmt.toFixed(2);
                    
                    // Plant 2 Bombs
                    this.bombs = [];
                    while(this.bombs.length < 2) {
                        let r = Math.floor(Math.random() * 25);
                        if(!this.bombs.includes(r)) this.bombs.push(r);
                    }
                    
                    this.init();
                    document.getElementById('minesControls').innerHTML = `<button onclick="games.mines.cashout()" class="col-span-2 bg-green-600 rounded-xl py-3 font-black">سحب الأرباح</button>`;
                },
                async pick(index) {
                    if(!this.active) return;
                    const box = document.getElementById(`box_${index}`);
                    if(box.classList.contains('revealed')) return;

                    box.classList.add('revealed');
                    
                    if(this.bombs.includes(index)) {
                        // BOMB! You Lose
                        box.innerHTML = '💣';
                        box.classList.replace('bg-slate-800', 'bg-red-600');
                        this.active = false;
                        this.revealAll();
                        alert("بووووم! خسرت الجولة.");
                        this.resetControls();
                    } else {
                        // SAFE! Increase multiplier
                        box.innerHTML = '💎';
                        box.classList.replace('bg-slate-800', 'bg-blue-600');
                        this.safePicks++;
                        
                        // Calculate standard Odds for 2 bombs in 25 boxes (House edge ~ 5%)
                        const odds = [1.04, 1.09, 1.14, 1.20, 1.27, 1.35, 1.44, 1.54, 1.66, 1.80, 1.96, 2.15, 2.37, 2.64, 2.97, 3.39, 3.96, 4.75, 5.94, 7.92, 11.88, 23.76, 50.00];
                        this.mult = odds[this.safePicks - 1];
                        
                        document.getElementById('minesMult').innerText = this.mult.toFixed(2) + "x";
                        document.getElementById('minesPot').innerText = (this.bet * this.mult).toFixed(2);
                        
                        if(this.safePicks === 23) this.cashout(); // Won everything
                    }
                },
                async cashout() {
                    if(!this.active) return;
                    const winAmt = this.bet * this.mult;
                    // Add balance to Firebase
                    const newBal = userBalance + winAmt;
                    await update(ref(db, 'users/' + currentUser.uid), { balance: newBal });
                    
                    this.active = false;
                    this.revealAll();
                    alert(`عاش! كسبت ${winAmt.toFixed(2)} EGP`);
                    this.resetControls();
                },
                revealAll() {
                    for(let i=0; i<25; i++) {
                        const b = document.getElementById(`box_${i}`);
                        if(this.bombs.includes(i)) b.innerHTML = '💣';
                    }
                },
                resetControls() {
                    setTimeout(() => {
                        document.getElementById('minesControls').innerHTML = `
                            <input type="number" id="minesBet" value="10" class="bg-slate-950 p-3 rounded-xl text-center font-bold outline-none border border-slate-800">
                            <button onclick="games.mines.start()" class="bg-blue-600 rounded-xl font-black">بدء الجولة</button>
                        `;
                        this.init();
                    }, 2000);
                }
            }
        };

        // Initialize empty board
        window.games.mines.init();
    </script>
</body>
</html>
