<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نيش-Nesh | القمة الإخبارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #ff4d4d;
            --gold: #ffd700;
            --dark-bg: #0f172a;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* هيدر أسطوري */
        header {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 30px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .h-logo {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--accent), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 77, 77, 0.5);
        }

        .search-bar {
            position: relative;
            width: 100%;
            max-width: 700px;
        }

        .search-bar input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        .search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* شريط الأخبار المتحرك */
        .breaking-news {
            background: var(--accent);
            padding: 10px;
            font-weight: bold;
            display: flex;
            gap: 20px;
        }

        /* كروت الأخبار بتصميم 3D */
        main { padding: 40px 5%; }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .news-card {
            background: var(--glass);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .news-card:hover {
            transform: scale(1.03) rotate(1deg);
            border-color: var(--gold);
        }

        .news-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            filter: grayscale(30%);
        }

        .news-card:hover .news-img { filter: grayscale(0%); }

        .news-info { padding: 20px; }

        .news-tag {
            background: var(--accent);
            padding: 4px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .news-title {
            margin: 15px 0;
            font-size: 1.3rem;
            line-height: 1.5;
        }

        .btn-more {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(to left, var(--accent), #b30000);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .loader {
            text-align: center;
            font-size: 2rem;
            padding: 100px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .h-logo { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <span class="h-logo">H</span>
            <h1 style="margin:0; letter-spacing: 2px;">نيش - NESH</h1>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="استكشف الأخبار الحصرية الآن...">
            <button onclick="handleSearch()" style="position:absolute; left:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--gold); cursor:pointer; font-weight:bold;">بحث</button>
        </div>
    </header>

    <main>
        <h2 style="border-right: 4px solid var(--accent); padding-right: 15px; margin-bottom: 40px;" id="title-text">
            التغطية المباشرة لـ نيش
        </h2>
        <div id="news-grid" class="news-grid">
            </div>
    </main>

    <script>
        const API_KEY = '7074b582c78b49de9496d5a09127cb31';

        // دالة تعمل تلقائياً عند فتح الموقع لجلب أهم أخبار مصر والحرب/الأحداث الجارية
        async function loadAutoNews() {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = '<div class="loader">جاري استحضار العظمة...</div>';

            // هذا الرابط يجمع بين أخبار مصر (eg) ومواضيع الحرب/الأحداث الجارية باستخدام البحث المتقدم
            const url = `https://newsapi.org/v2/everything?q=(مصر OR سيناء OR غزة OR الحرب)&language=ar&sortBy=publishedAt&apiKey=${API_KEY}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                renderNews(data.articles);
            } catch (e) {
                grid.innerHTML = "خطأ في الاتصال بالسيرفر";
            }
        }

        // دالة البحث اليدوي
        async function handleSearch() {
            const q = document.getElementById('search-input').value;
            if(!q) return;
            document.getElementById('title-text').innerText = `نتائج البحث عن: ${q}`;
            const url = `https://newsapi.org/v2/everything?q=${q}&language=ar&apiKey=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            renderNews(data.articles);
        }

        function renderNews(articles) {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = '';
            articles.slice(0, 21).forEach(art => { // عرض أول 21 خبر
                if(!art.title || art.title.includes("[Removed]")) return;
                
                grid.innerHTML += `
                    <div class="news-card">
                        <img src="${art.urlToImage || 'https://images.unsplash.com/photo-1504711432869-efd597cdd042?w=800'}" class="news-img">
                        <div class="news-info">
                            <span class="news-tag">${art.source.name}</span>
                            <h3 class="news-title">${art.title}</h3>
                            <a href="${art.url}" target="_blank" class="btn-more">اقرأ الخبر كاملاً</a>
                        </div>
                    </div>
                `;
            });
        }

        // تنفيذ الجلب التلقائي فور التحميل
        window.onload = loadAutoNews;
    </script>
</body>
</html>
