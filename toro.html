<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homos Flash</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        canvas {
            background-color: #34495e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-bottom: 8px solid #ecf0f1;
            border-radius: 5px 5px 0 0;
        }
        h1 {
            margin-bottom: 10px;
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            margin-top: 15px;
            font-size: 16px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <h1>Homos Flash</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <p>اضغط على زر المسافة (Space) أو انقر على الشاشة للقفز!</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // إعدادات اللاعب (المكعب)
        const player = {
            x: 100,
            y: 300,
            size: 40,
            dy: 0,
            jumpForce: -12,
            gravity: 0.6,
            isGrounded: false,
            color: "#e74c3c"
        };

        // إعدادات اللعبة
        let obstacles = [];
        let frameCount = 0;
        let score = 0;
        let isGameOver = false;
        let gameSpeed = 6;

        // التحكم بالقفز
        function jump() {
            if (player.isGrounded && !isGameOver) {
                player.dy = player.jumpForce;
                player.isGrounded = false;
            } else if (isGameOver) {
                resetGame();
            }
        }

        // الاستماع للأزرار والنقرات
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") jump();
        });
        window.addEventListener("mousedown", jump);
        window.addEventListener("touchstart", jump);

        // إنشاء العقبات (المثلثات/الأشواك)
        function spawnObstacle() {
            const size = 40;
            obstacles.push({
                x: canvas.width,
                y: canvas.height - size,
                width: size,
                height: size
            });
        }

        // إعادة تشغيل اللعبة
        function resetGame() {
            player.y = canvas.height - player.size;
            player.dy = 0;
            obstacles = [];
            score = 0;
            frameCount = 0;
            gameSpeed = 6;
            isGameOver = false;
            gameLoop();
        }

        // تحديث البيانات (الفيزياء والمنطق)
        function update() {
            if (isGameOver) return;

            frameCount++;
            
            // تطبيق الجاذبية
            player.dy += player.gravity;
            player.y += player.dy;

            // الاصطدام بالأرض
            if (player.y + player.size >= canvas.height) {
                player.y = canvas.height - player.size;
                player.dy = 0;
                player.isGrounded = true;
            }

            // زيادة صعوبة اللعبة (السرعة)
            if (frameCount % 600 === 0) gameSpeed += 1;

            // إضافة عقبات جديدة بشكل عشوائي
            if (frameCount % Math.floor(Math.random() * 60 + 50) === 0) {
                spawnObstacle();
            }

            // تحديث موقع العقبات والتحقق من الاصطدام
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                // التحقق من الاصطدام (Collision Detection)
                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.size > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.size > obs.y
                ) {
                    isGameOver = true;
                }

                // إزالة العقبات التي خرجت من الشاشة وزيادة النقاط
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    score += 10;
                    i--;
                }
            }
        }

        // رسم العناصر على الشاشة
        function draw() {
            // مسح الشاشة
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // رسم اللاعب
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // رسم العقبات (أشواك)
            ctx.fillStyle = "#2ecc71";
            obstacles.forEach(obs => {
                ctx.beginPath();
                ctx.moveTo(obs.x + obs.width / 2, obs.y); // قمة المثلث
                ctx.lineTo(obs.x + obs.width, obs.y + obs.height); // الزاوية اليمنى
                ctx.lineTo(obs.x, obs.y + obs.height); // الزاوية اليسرى
                ctx.fill();
            });

            // رسم النقاط
            ctx.fillStyle = "white";
            ctx.font = "24px Arial";
            ctx.textAlign = "left";
            ctx.fillText("النقاط: " + score, 20, 40);

            // شاشة النهاية
            if (isGameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.font = "20px Arial";
                ctx.fillText("انقر أو اضغط مسافة لإعادة المحاولة", canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        // حلقة اللعبة (Game Loop)
        function gameLoop() {
            update();
            draw();
            if (!isGameOver) {
                requestAnimationFrame(gameLoop);
            }
        }

        // بدء اللعبة
        gameLoop();
    </script>
</body>
</html>
