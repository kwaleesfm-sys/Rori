<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نيش-Nesh | القمة الإخبارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0a0e17;
            --card-bg: rgba(20, 26, 40, 0.6);
            --primary-red: #e63946;
            --primary-gold: #f4a261;
            --text-light: #f8f9fa;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 15% 50%, rgba(230, 57, 70, 0.05), transparent 25%);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* شريط الأخبار العاجلة */
        .ticker-wrap {
            background: var(--primary-red);
            width: 100%;
            height: 40px;
            overflow: hidden;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 1001;
        }
        .ticker-title {
            background: #900000;
            color: white;
            padding: 0 20px;
            font-weight: 900;
            height: 100%;
            display: flex;
            align-items: center;
            position: absolute;
            right: 0;
            z-index: 2;
        }
        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 30s linear infinite;
        }
        .ticker-item { margin-left: 50px; font-weight: 600; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* الهيدر واللوجو */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 5%;
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        
        .logo-container { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo-img { width: 55px; height: auto; border-radius: 10px; filter: drop-shadow(0 0 8px var(--primary-gold)); }
        .brand-name { font-size: 2.2rem; font-weight: 900; background: linear-gradient(45deg, var(--primary-gold), var(--primary-red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-box { position: relative; width: 100%; max-width: 400px; }
        .search-box input { width: 100%; padding: 12px 45px 12px 20px; border-radius: 30px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; outline: none; }
        .search-btn { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--primary-gold); cursor: pointer; }

        .nav-categories { display: flex; gap: 10px; margin-top: 20px; overflow-x: auto; padding-bottom: 10px; }
        .cat-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #ccc; padding: 8px 22px; border-radius: 25px; cursor: pointer; font-weight: 700; white-space: nowrap; transition: 0.3s; }
        .cat-btn:hover, .cat-btn.active { background: var(--primary-red); color: white; border-color: var(--primary-red); transform: translateY(-3px); }

        /* الشبكة الإخبارية */
        main { padding: 40px 5%; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        .news-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .news-card:hover { transform: translateY(-10px); border-color: var(--primary-gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .img-wrapper { height: 210px; position: relative; }
        .news-img { width: 100%; height: 100%; object-fit: cover; }
        .source-badge { position: absolute; top: 15px; right: 15px; background: rgba(230, 57, 70, 0.9); padding: 4px 12px; border-radius: 5px; font-size: 0.75rem; font-weight: 800; }

        .news-info { padding: 20px; }
        .news-title { font-size: 1.15rem; font-weight: 800; line-height: 1.5; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* نافذة القراءة Modal */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); z-index:2000; display:none; justify-content:center; align-items:center; }
        .modal-content { background:#111827; width:90%; max-width:800px; max-height:85vh; border-radius:24px; overflow-y:auto; border:1px solid var(--primary-red); position:relative; }
        .close-btn { position:absolute; top:20px; left:20px; background:var(--primary-red); border:none; color:white; width:40px; height:40px; border-radius:50%; cursor:pointer; font-weight:bold; }
        .modal-body { padding: 30px; }
        .modal-img { width: 100%; border-radius: 15px; margin-bottom: 20px; }

        .loader { grid-column: 1/-1; text-align: center; padding: 100px; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker-title">عاجل نيش</div>
        <div class="ticker-move" id="ticker-content">جاري سحب التغطية الحية...</div>
    </div>

    <header>
        <div class="header-content">
            <div class="logo-container" onclick="location.reload()">
                <img src="logo.png" alt="N" class="logo-img" onerror="this.src='https://via.placeholder.com/60/000/ffd700?text=N'">
                <span class="brand-name">NESH</span>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="بحث في الأحداث العالمية..." onkeypress="if(event.key==='Enter')handleSearch()">
                <button class="search-btn" onclick="handleSearch()"><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div class="nav-categories">
            <button class="cat-btn active" onclick="changeCat('nation', this)">أخبار مصر</button>
            <button class="cat-btn" onclick="changeCat('world', this)">العالم</button>
            <button class="cat-btn" onclick="changeCat('sports', this)">رياضة</button>
            <button class="cat-btn" onclick="changeCat('technology', this)">تكنولوجيا</button>
            <button class="cat-btn" onclick="changeCat('business', this)">اقتصاد</button>
        </div>
    </header>

    <main>
        <h2 id="section-title" style="margin-bottom:30px; border-right:5px solid var(--primary-gold); padding-right:15px;">آخر التحديثات</h2>
        <div id="news-grid" class="news-grid"></div>
    </main>

    <div id="newsModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">X</button>
            <div id="modal-data"></div>
        </div>
    </div>

    <script>
        const G_KEY = 'b5c79c2634b3d676e7fac67a10fa51d0';
        let articles = [];

        async function fetchNews(category = 'nation', query = '') {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = '<div class="loader">نيش يحلل البيانات...</div>';
            
            // رابط GNews يختلف (نستخدم country=eg لأخبار مصر)
            let url = `https://gnews.io/api/v4/top-headlines?category=${category}&lang=ar&country=eg&apikey=${G_KEY}`;
            if(query) url = `https://gnews.io/api/v4/search?q=${query}&lang=ar&apikey=${G_KEY}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                articles = data.articles;
                renderNews(articles);
                updateTicker(articles);
            } catch (e) { grid.innerHTML = "فشل التحميل. تأكد من المفتاح."; }
        }

        function renderNews(arts) {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = arts.length ? '' : 'لا توجد نتائج.';
            arts.forEach((art, i) => {
                grid.innerHTML += `
                    <div class="news-card" onclick="openModal(${i})">
                        <div class="img-wrapper">
                            <span class="source-badge">${art.source.name}</span>
                            <img src="${art.image}" class="news-img">
                        </div>
                        <div class="news-info">
                            <h3 class="news-title">${art.title}</h3>
                            <div style="color:var(--primary-gold); font-weight:bold;">اقرأ المزيد داخل نيش ←</div>
                        </div>
                    </div>`;
            });
        }

        function updateTicker(arts) {
            const ticker = document.getElementById('ticker-content');
            ticker.innerHTML = arts.map(a => `<span class="ticker-item">🔥🔥 ${a.title}</span>`).join('');
        }

        function openModal(i) {
            const art = articles[i];
            const modalData = document.getElementById('modal-data');
            modalData.innerHTML = `
                <img src="${art.image}" class="modal-img">
                <div class="modal-body">
                    <h1 style="margin-bottom:20px; line-height:1.4;">${art.title}</h1>
                    <p style="font-size:1.2rem; color:#d1d5db; margin-bottom:20px; line-height:1.8;">${art.description}</p>
                    <p style="color:#888; margin-bottom:30px;">المصدر الأصلي: ${art.source.name}</p>
                    <a href="${art.url}" target="_blank" style="background:var(--primary-red); color:white; padding:12px 25px; border-radius:30px; text-decoration:none; font-weight:bold;">زيارة المصدر الأصلي</a>
                </div>`;
            document.getElementById('newsModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('newsModal').style.display = 'none'; }
        function handleSearch() { fetchNews('', document.getElementById('search-input').value); }
        function changeCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchNews(cat);
        }

        window.onload = () => fetchNews();
    </script>
</body>
</html>
