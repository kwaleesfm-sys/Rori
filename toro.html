<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMOS BET - منظومة التحكم الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background: #020617;
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b, transparent), radial-gradient(circle at bottom left, #0f172a, transparent);
        }

        header { 
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--primary); text-transform: uppercase; }
        .logo span { color: #fff; font-size: 0.9rem; margin-right: 5px; opacity: 0.7; }

        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: var(--glass); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); text-align: center; }
        .stat-card i { font-size: 1.2rem; color: var(--primary); margin-bottom: 5px; }
        .stat-val { display: block; font-weight: 900; font-size: 1.2rem; }

        /* Success Gauge */
        .gauge-box { background: var(--glass); margin: 0 15px 20px; padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); position: relative; }
        .progress-bg { width: 100%; height: 8px; background: #334155; border-radius: 10px; margin: 10px 0; }
        #mainGauge { height: 100%; width: 50%; border-radius: 10px; background: linear-gradient(90deg, var(--danger), var(--success)); transition: 1.5s ease-in-out; }

        /* Tabs Navigation */
        .nav-bar { display: flex; background: var(--glass); margin: 15px; border-radius: 50px; padding: 5px; border: 1px solid var(--glass-border); }
        .nav-item { flex: 1; text-align: center; padding: 10px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 0.9rem; }
        .nav-item.active { background: var(--primary); color: #000; }

        .content-section { display: none; padding: 0 15px 100px; animation: slideUp 0.4s ease; }
        .content-section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Smart Apple Logic UI */
        .board { background: #000; padding: 10px; border-radius: 15px; display: grid; gap: 5px; }
        .row { display: grid; grid-template-columns: 30px repeat(5, 1fr); gap: 5px; align-items: center; }
        .cell { aspect-ratio: 1; background: #1e293b; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .cell.win { border: 2px solid var(--success); box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); background: rgba(16, 185, 129, 0.1); }

        /* Slips & Management */
        .slip-item { 
            background: var(--glass); padding: 15px; border-radius: 15px; margin-bottom: 10px;
            border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;
        }
        .slip-meta h4 { color: var(--primary); }
        .slip-actions { display: flex; gap: 10px; align-items: center; }
        .del-btn { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1.2rem; display: none; }
        .copy-btn { background: #334155; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        /* Neon Indicators */
        .neon-1xbet { border-right: 4px solid var(--danger); box-shadow: -5px 0 10px rgba(239, 68, 68, 0.2); }
        .neon-linebet { border-right: 4px solid var(--success); box-shadow: -5px 0 10px rgba(16, 185, 129, 0.2); }

        /* Admin Badge */
        #adminBadge { display: none; background: var(--success); color: #000; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo">HOMOS <span>PRO SYSTEM</span> <span id="adminBadge">مدير النظام</span></div>
        <i class="fas fa-fingerprint" id="authBtn" style="font-size: 1.4rem; cursor: pointer; color: var(--primary);"></i>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-users"></i><span class="stat-val" id="userCount">...</span><small>نشط الآن</small></div>
        <div class="stat-card"><i class="fas fa-trophy"></i><span class="stat-val" id="winCount">...</span><small>إجمالي الأرباح</small></div>
    </div>

    <div class="gauge-box">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h4 id="statusText">جاري فحص التشفير...</h4>
            <span id="percentText" style="font-weight: 900; color: var(--success);">0%</span>
        </div>
        <div class="progress-bg"><div id="mainGauge"></div></div>
        <p style="font-size: 0.7rem; opacity: 0.6; margin-top: 5px;">* الخوارزمية يتم تحديثها كل 30 ثانية بناءً على سحب المستخدمين.</p>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" data-sec="logic-sec">🧠 الذكاء الإصطناعي</div>
        <div class="nav-item" data-sec="slips-sec">🔓 القسائم السرية</div>
    </div>

    <!-- Apple Logic Section -->
    <section class="content-section active" id="logic-sec">
        <button id="startAi" style="width: 100%; padding: 15px; border-radius: 15px; background: var(--primary); border: none; font-weight: 900; cursor: pointer; margin-bottom: 15px;">
            <i class="fas fa-microchip"></i> استخراج مسار التفاحة المضمون
        </button>
        <div class="board" id="appleBoard"></div>
        <div id="aiConsole" style="margin-top: 15px; padding: 10px; background: #000; border-radius: 10px; font-family: monospace; font-size: 0.8rem; color: #10b981; display: none;"></div>
    </section>

    <!-- Slips Section -->
    <section class="content-section" id="slips-sec">
        <div id="adminControls" style="display: none; margin-bottom: 20px; background: var(--glass); padding: 15px; border-radius: 15px; border: 1px dashed var(--primary);">
            <h5 style="margin-bottom: 10px;">إضافة قسيمة جديدة (أدمن)</h5>
            <input type="text" id="appInput" placeholder="اسم التطبيق" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: none; background: #1e293b; color: #fff;">
            <input type="text" id="codeInput" placeholder="الكود" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: none; background: #1e293b; color: #fff;">
            <button id="pushSlip" style="width: 100%; padding: 10px; background: var(--success); border: none; border-radius: 8px; font-weight: bold;">نشر القسيمة فوراً</button>
        </div>
        <div id="slipsList"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5fbIJ3rbV5Ud1mnQgZGTcjYZSrnQqNbA",
            authDomain: "fir-cb754.firebaseapp.com",
            databaseURL: "https://fir-cb754-default-rtdb.firebaseio.com",
            projectId: "fir-cb754",
            storageBucket: "fir-cb754.firebasestorage.app",
            messagingSenderId: "14696382194",
            appId: "1:14696382194:web:c3879f894094d67eae1a6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let isAdmin = false;

        // --- Auth System (The New Password) ---
        document.getElementById('authBtn').onclick = () => {
            const pass = prompt("أدخل كود الوصول للمنظومة:");
            if (pass === "Homos77#") {
                isAdmin = true;
                document.getElementById('adminBadge').style.display = 'inline-block';
                document.getElementById('adminControls').style.display = 'block';
                alert("أهلاً يا أحمد! تم تفعيل صلاحيات الأدمن والحذف.");
                renderSlips(); // Refresh to show delete buttons
            } else {
                alert("كود خاطئ! مسموح لك فقط بمشاهدة القسائم العامة.");
            }
        };

        // --- Navigation ---
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.nav-item, .content-section').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                document.getElementById(item.dataset.sec).classList.add('active');
            }
        });

        // --- Logic: Fake Live Stats ---
        function updateStats() {
            document.getElementById('userCount').innerText = Math.floor(Math.random() * (150 - 80) + 80);
            document.getElementById('winCount').innerText = (Math.random() * (50000 - 45000) + 45000).toLocaleString('ar-EG') + "ج";
        }
        setInterval(updateStats, 5000); updateStats();

        // --- Logic: AI Apple Board ---
        document.getElementById('startAi').onclick = () => {
            const console = document.getElementById('aiConsole');
            console.style.display = 'block';
            console.innerHTML = "> جاري الاتصال بخوادم البروفايدر...<br>";
            
            let steps = [
                "> تم فحص الثغرة رقم #441",
                "> استلام بيانات الاحتمالات العكسية",
                "> رسم المسار الأكثر أماناً..."
            ];

            steps.forEach((text, i) => {
                setTimeout(() => { console.innerHTML += text + "<br>"; }, i * 500);
            });

            setTimeout(generateApplePath, 2000);
        };

        function generateApplePath() {
            const board = document.getElementById('appleBoard');
            board.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                const label = document.createElement('div');
                label.innerText = `x${i+1}`; label.style.fontSize = '0.7rem'; row.appendChild(label);

                let safeIdx = Math.floor(Math.random() * 5);
                for (let j = 0; j < 5; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (j === safeIdx ? ' win' : '');
                    cell.innerHTML = j === safeIdx ? '🍎' : ' ';
                    row.appendChild(cell);
                }
                board.appendChild(row);
            }
        }

        // --- Slips Management (The Core Change) ---
        const slipsRef = ref(db, 'daily_slips');
        
        function renderSlips() {
            onValue(slipsRef, (snap) => {
                const list = document.getElementById('slipsList');
                list.innerHTML = '';
                const data = snap.val();
                if (data) {
                    Object.keys(data).reverse().forEach(key => {
                        const slip = data[key];
                        const appName = slip.appName.toLowerCase();
                        let neon = appName.includes('1xbet') ? 'neon-1xbet' : (appName.includes('linebet') ? 'neon-linebet' : '');
                        
                        const div = document.createElement('div');
                        div.className = `slip-item ${neon}`;
                        div.innerHTML = `
                            <div class="slip-meta">
                                <h4>${slip.appName}</h4>
                                <small>محدث منذ دقائق</small>
                            </div>
                            <div class="slip-actions">
                                <button class="copy-btn" onclick="copySlip('${slip.code}')">${slip.code}</button>
                                <button class="del-btn" style="display: ${isAdmin ? 'block' : 'none'}" onclick="deleteSlip('${key}')">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        `;
                        list.appendChild(div);
                    });
                } else {
                    list.innerHTML = '<p style="text-align:center; opacity:0.5;">لا توجد قسائم حالية.</p>';
                }
            });
        }
        renderSlips();

        // Admin: Add Slip
        document.getElementById('pushSlip').onclick = async () => {
            const appName = document.getElementById('appInput').value;
            const code = document.getElementById('codeInput').value;
            if (appName && code) {
                await push(slipsRef, { appName, code, timestamp: Date.now() });
                document.getElementById('appInput').value = '';
                document.getElementById('codeInput').value = '';
                alert("تم النشر في المنظومة بنجاح!");
            }
        };

        // Admin: Delete Slip (New Function)
        window.deleteSlip = async (id) => {
            if (confirm("هل أنت متأكد من حذف هذه القسيمة نهائياً؟")) {
                await remove(ref(db, `daily_slips/${id}`));
                alert("تم الحذف بنجاح.");
            }
        };

        window.copySlip = (text) => {
            navigator.clipboard.writeText(text);
            alert("تم نسخ الكود بنجاح!");
        };

        // Success Gauge Simulation Logic
        const statsRef = ref(db, 'global_stats');
        onValue(statsRef, (snap) => {
            const data = snap.val() || { wins: 75, total: 100 };
            const percent = Math.round((data.wins / data.total) * 100);
            document.getElementById('mainGauge').style.width = percent + '%';
            document.getElementById('percentText').innerText = percent + '%';
            document.getElementById('statusText').innerText = percent > 80 ? "🔥 السيرفر مخترق ومضمون" : "⚖️ السيرفر متقلب.. العب بحذر";
        });

    </script>
</body>
</html>
