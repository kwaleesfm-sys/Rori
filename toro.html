<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMOS BET MAX - v11.0 TOTAL SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --glass: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --info: #3b82f6;
            --text-main: #ffffff;
            --neon-blue: 0 0 15px rgba(59, 130, 246, 0.6);
            --neon-red: 0 0 15px rgba(239, 68, 68, 0.6);
            --neon-green: 0 0 15px rgba(16, 185, 129, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #020617; background-image: radial-gradient(circle at top right, #1e293b, transparent), radial-gradient(circle at bottom left, #0f172a, transparent); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* شريط الأخبار البطيء جداً (45 ثانية) */
        .ticker-wrap { background: #000; width: 100%; overflow: hidden; border-bottom: 1px solid var(--glass-border); padding: 12px 0; color: var(--success); font-weight: bold; font-size: 0.9rem; white-space: nowrap; }
        .ticker-move { display: inline-block; padding-right: 100%; animation: scroll-rtl 45s linear infinite; }
        @keyframes scroll-rtl { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        header { background: var(--glass); backdrop-filter: blur(20px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000; }
        .logo-box { display: flex; align-items: center; gap: 8px; }
        .logo-icon { color: var(--primary); font-size: 1.6rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { text-shadow: 0 0 5px var(--primary); } 50% { text-shadow: 0 0 20px var(--primary); } 100% { text-shadow: 0 0 5px var(--primary); } }
        .logo-box h1 { font-size: 1.5rem; font-weight: 900; }
        .logo-box span { color: var(--primary); }

        .status-container { background: var(--glass); margin: 15px 20px; padding: 15px; border-radius: 20px; border: 1px solid var(--glass-border); }
        .gauge-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.85rem; font-weight: bold; }
        .progress-bar { width: 100%; height: 10px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        #globalFill { height: 100%; width: 50%; background: linear-gradient(90deg, var(--info), var(--success)); transition: 1.5s ease; }

        .nav-tabs { display: flex; background: var(--glass); margin: 0 20px 15px; padding: 6px; border-radius: 50px; border: 1px solid var(--glass-border); gap: 5px; }
        .tab-item { flex: 1; text-align: center; padding: 10px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; color: rgba(255,255,255,0.5); font-size: 0.8rem; }
        .tab-item.active { background: var(--primary); color: #000; }

        .content-sec { display: none; padding: 0 20px 100px; animation: fadeIn 0.4s ease; }
        .content-sec.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Boards Design */
        .board-container { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; border: 1px solid var(--glass-border); }
        .apple-row { display: grid; grid-template-columns: 45px repeat(5, 1fr); gap: 6px; align-items: center; margin-bottom: 6px; }
        .multiplier-tag { font-size: 0.7rem; font-weight: 900; color: var(--primary); text-align: center; }
        .cell { aspect-ratio: 1; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s; }
        
        /* التلوين الجديد للجواهر */
        .safe-highlight { background: rgba(59, 130, 246, 0.2) !important; border: 2px solid var(--info) !important; box-shadow: var(--neon-blue); transform: scale(1.05); }
        .risk-highlight { background: rgba(239, 68, 68, 0.2) !important; border: 2px solid var(--danger) !important; box-shadow: var(--neon-red); transform: scale(1.05); }
        .highlight { background: rgba(16, 185, 129, 0.15); border: 2px solid var(--success) !important; box-shadow: var(--neon-green); transform: scale(1.05); }

        .console-box { background: #000; color: #10b981; font-family: monospace; font-size: 0.75rem; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #1e293b; display: none; text-align: left; direction: ltr; }
        .safe-msg { color: var(--primary); background: rgba(245, 158, 11, 0.1); padding: 10px; border-radius: 10px; text-align: center; font-size: 0.8rem; margin: 10px 0; border: 1px dashed var(--primary); display: none; }

        .action-btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        .primary-btn { background: var(--primary); color: #000; }
        
        .strategy-tool { background: rgba(245, 158, 11, 0.05); border: 1px solid rgba(245, 158, 11, 0.2); border-radius: 15px; padding: 12px; margin: 15px 0; }
        .calc-flex { display: flex; gap: 8px; margin-top: 8px; }
        .calc-input { flex: 1; background: #000; border: 1px solid var(--glass-border); color: #fff; padding: 10px; border-radius: 8px; font-size: 0.8rem; }

        /* Slips Styles */
        .slip-card { background: var(--glass); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
        .blue-glow { border-color: var(--info); box-shadow: var(--neon-blue); }
        .green-glow { border-color: var(--success); box-shadow: var(--neon-green); }
        .safety-tag { position: absolute; top: 0; left: 0; padding: 2px 12px; font-size: 0.65rem; font-weight: bold; border-bottom-right-radius: 12px; }
        .safe-bg { background: var(--success); color: #fff; }
        .risk-bg { background: var(--danger); color: #fff; }
        .copy-btn { background: #334155; border: none; color: white; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #adminPanel { display: none; background: rgba(239, 68, 68, 0.05); border: 1px dashed var(--danger); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: #0f172a; color: #fff; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>

    <div class="ticker-wrap"><div class="ticker-move" id="tickerUI">⚡ جاري معايرة السيرفر... اتبع الاختيارات الزرقاء لأمان أعلى ⚡</div></div>

    <header>
        <div class="logo-box">
            <i class="fas fa-crosshairs logo-icon"></i>
            <h1>HOMOS <span>MAX</span></h1>
        </div>
        <i class="fas fa-fingerprint" id="authBtn" style="font-size: 1.5rem; color: var(--glass-border); cursor: pointer;"></i>
    </header>

    <div class="status-container">
        <div class="gauge-header"><span>Server Accuracy</span><span id="gaugePercent" style="color: var(--success);">0%</span></div>
        <div class="progress-bar"><div id="globalFill"></div></div>
    </div>

    <div class="nav-tabs">
        <div class="tab-item active" data-sec="apple-sec">🎯 Apple</div>
        <div class="tab-item" data-sec="mines-sec">💎 Mines</div>
        <div class="tab-item" data-sec="slips-sec">🗝️ Slips</div>
    </div>

    <section class="content-sec active" id="apple-sec">
        <button class="action-btn primary-btn" id="runApple"><i class="fas fa-robot"></i> تشغيل إسكربت التفاحة</button>
        <div class="console-box" id="conApple"></div>
        <div class="board-container" id="appleBoard"></div>
        <div class="safe-msg" id="msgApple" style="display:block">⚠️ الوضع الآمن: ممتد حتى x2.41</div>
        
        <div class="strategy-tool">
            <h4 style="font-size:0.8rem; color:var(--primary);"><i class="fas fa-calculator"></i> معوض الخسائر</h4>
            <div class="calc-flex">
                <input type="number" id="betApple" class="calc-input" placeholder="رهانك الخاسر">
                <button class="copy-btn" onclick="calc('apple')">احسب</button>
            </div>
            <p id="resApple" style="font-size:0.7rem; margin-top:5px; color:var(--success);"></p>
        </div>

        <div id="feedApple" style="display:none; gap:10px; margin-top:10px;">
            <button class="action-btn" style="background:var(--success); color:#fff; flex:1;" onclick="report('apple', true)">ربحت ✅</button>
            <button class="action-btn" style="background:var(--danger); color:#fff; flex:1;" onclick="report('apple', false)">خسرت ❌</button>
        </div>
        <button class="action-btn" id="expApple" style="display:none; background:#fff; color:#000;"><i class="fab fa-tiktok"></i> تصوير الأرباح</button>
    </section>

    <section class="content-sec" id="mines-sec">
        <button class="action-btn primary-btn" id="runMines"><i class="fas fa-gem"></i> كشف 9 جواهر متوقعة</button>
        <div class="console-box" id="conMines"></div>
        <div class="board-container" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px;" id="minesBoard"></div>
        <div class="safe-msg" id="msgMines" style="display:block; border-color:var(--info); color:var(--info); background:rgba(59,130,246,0.1);">
            🔵 <b>اللون الأزرق:</b> آمن ومضمون | 🔴 <b>اللون الأحمر:</b> مخاطرة عالية
        </div>

        <div class="strategy-tool">
            <h4 style="font-size:0.8rem; color:var(--primary);"><i class="fas fa-calculator"></i> معوض الخسائر</h4>
            <div class="calc-flex">
                <input type="number" id="betMines" class="calc-input" placeholder="رهانك الخاسر">
                <button class="copy-btn" onclick="calc('mines')">احسب</button>
            </div>
            <p id="resMines" style="font-size:0.7rem; margin-top:5px; color:var(--success);"></p>
        </div>

        <div id="feedMines" style="display:none; gap:10px; margin-top:10px;">
            <button class="action-btn" style="background:var(--success); color:#fff; flex:1;" onclick="report('mines', true)">ربحت ✅</button>
            <button class="action-btn" style="background:var(--danger); color:#fff; flex:1;" onclick="report('mines', false)">خسرت ❌</button>
        </div>
        <button class="action-btn" id="expMines" style="display:none; background:#fff; color:#000;"><i class="fab fa-tiktok"></i> تصوير الأرباح</button>
    </section>

    <section class="content-sec" id="slips-sec">
        <div id="adminPanel">
            <input type="text" id="newsInput" class="admin-input" placeholder="خبر جديد للشريط...">
            <button id="addNews" class="action-btn" style="background:var(--info); color:#fff;">نشر الخبر</button>
            <hr style="border-color:var(--glass-border); margin:15px 0;">
            <input type="text" id="appInp" class="admin-input" placeholder="التطبيق (1xbet / linebet)">
            <input type="text" id="codeInp" class="admin-input" placeholder="كود القسيمة">
            <select id="safeSelect" class="admin-input"><option value="safe">آمنة ✅</option><option value="risk">مخاطرة ⚠️</option></select>
            <button id="addSlip" class="action-btn" style="background:var(--success); color:#fff;">حفظ ونشر</button>
        </div>
        <div id="slipsList"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5fbIJ3rbV5Ud1mnQgZGTcjYZSrnQqNbA",
            authDomain: "fir-cb754.firebaseapp.com",
            databaseURL: "https://fir-cb754-default-rtdb.firebaseio.com",
            projectId: "fir-cb754",
            storageBucket: "fir-cb754.firebasestorage.app",
            messagingSenderId: "14696382194",
            appId: "1:14696382194:web:c3879f894094d67eae1a6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isAdmin = localStorage.getItem('homosAdmin') === 'true';
        if(isAdmin) document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('authBtn').onclick = () => {
            if(!isAdmin && prompt("Pass:") === "Homos77#") { localStorage.setItem('homosAdmin', 'true'); location.reload(); }
            else if(isAdmin && confirm("Logout?")) { localStorage.removeItem('homosAdmin'); location.reload(); }
        };

        let lastPathM = [];

        onValue(ref(db, 'live_ticker'), (snap) => {
            let d = snap.val(), s = "";
            if(d) { Object.values(d).reverse().slice(0, 5).forEach(i => s += ` &nbsp;&nbsp;&nbsp;&nbsp; 🔥 ${i.text} &nbsp;&nbsp;&nbsp;&nbsp; | `); document.getElementById('tickerUI').innerHTML = s + s; }
        });

        const statsRef = ref(db, 'system_performance');
        onValue(statsRef, (snap) => {
            let d = snap.val() || { wins: 85, total: 100 }, p = Math.round((d.wins/d.total)*100);
            document.getElementById('globalFill').style.width = p+'%'; document.getElementById('gaugePercent').innerText = p+'%';
        });

        // Apple Original Logic
        function initA() {
            const b = document.getElementById('appleBoard'); b.innerHTML = '';
            const mults = ["x1.23", "x1.54", "x1.93", "x2.41", "x4.02", "x6.71", "x11.18", "x27.9", "x69.8", "x349"];
            for(let i=9; i>=0; i--) {
                let r = document.createElement('div'); r.className='apple-row';
                r.innerHTML = `<div class="multiplier-tag">${mults[i]}</div>`;
                for(let j=0; j<5; j++) r.innerHTML += `<div class="cell" id="a-${i}-${j}"></div>`;
                b.appendChild(r);
            }
        }
        initA();

        document.getElementById('runApple').onclick = () => {
            initA();
            const con = document.getElementById('conApple'); con.style.display='block'; con.innerHTML = "> Scanning Matrix...<br>";
            let l = 0;
            let timer = setInterval(() => {
                if(l > 9) { clearInterval(timer); document.getElementById('feedApple').style.display='flex'; document.getElementById('expApple').style.display='block'; return; }
                let c = Math.floor(Math.random()*5);
                document.getElementById(`a-${l}-${c}`).classList.add('highlight');
                document.getElementById(`a-${l}-${c}`).innerHTML = '🍎';
                l++;
            }, 350);
        };

        // Mines (9 choices: 3 blue / 6 red)
        function initM() {
            const b = document.getElementById('minesBoard'); b.innerHTML = '';
            for(let i=0; i<25; i++) b.innerHTML += `<div class="cell" id="m-${i}"></div>`;
        }
        initM();

        document.getElementById('runMines').onclick = () => {
            const btn = document.getElementById('runMines'); btn.disabled = true;
            initM(); lastPathM = [];
            const con = document.getElementById('conMines'); con.style.display='block'; con.innerHTML = "> Bypass Grid...<br>";
            let found = 0;
            let timer = setInterval(() => {
                if(found >= 9) { 
                    clearInterval(timer); btn.disabled = false; 
                    document.getElementById('feedMines').style.display = 'flex'; 
                    document.getElementById('expMines').style.display = 'block';
                    return; 
                }
                let idx; do { idx = Math.floor(Math.random()*25); } while(lastPathM.includes(idx));
                lastPathM.push(idx);
                let cell = document.getElementById(`m-${idx}`);
                if(found < 3) cell.classList.add('safe-highlight');
                else cell.classList.add('risk-highlight');
                cell.innerHTML = '💎';
                found++;
            }, 450);
        };

        // Snapshot TikTok
        window.snap = (id) => {
            html2canvas(document.getElementById(id), {backgroundColor:'#020617'}).then(c => {
                let a=document.createElement('a'); a.download='HOMOS_MAX.png'; a.href=c.toDataURL(); a.click();
            });
        };
        document.getElementById('expApple').onclick = () => snap('appleBoard');
        document.getElementById('expMines').onclick = () => snap('minesBoard');

        // Martingale
        window.calc = (t) => {
            let v = parseFloat(document.getElementById('bet'+t.charAt(0).toUpperCase()+t.slice(1)).value);
            if(v) document.getElementById('res'+t.charAt(0).toUpperCase()+t.slice(1)).innerText = `عوض خسارتك بـ ${Math.ceil(v*2.5)} في المرة القادمة.`;
        };

        // Slips & News
        onValue(ref(db, 'pro_slips'), (snap) => {
            const list = document.getElementById('slipsList'); list.innerHTML = '';
            let d = snap.val();
            if(d) {
                Object.keys(d).reverse().forEach(k => {
                    let s = d[k], appL = s.appName.toLowerCase();
                    let glow = appL.includes('1x') ? 'blue-glow' : 'green-glow';
                    let tag = s.safety === 'safe' ? 'safe-bg' : 'risk-bg';
                    let tagT = s.safety === 'safe' ? 'آمنة ✅' : 'مخاطرة ⚠️';
                    let del = isAdmin ? `<button style="color:red; background:none; border:none;" onclick="window.delSlip('${k}')"><i class="fas fa-trash"></i></button>` : '';
                    list.innerHTML += `<div class="slip-card ${glow}"><div class="safety-tag ${tag}">${tagT}</div><h3>${s.appName.toUpperCase()}</h3><div>${del}<button class="copy-btn" onclick="navigator.clipboard.writeText('${s.code}'); alert('تم!')">${s.code}</button></div></div>`;
                });
            }
        });

        window.delSlip = (k) => { if(confirm("حذف؟")) remove(ref(db, `pro_slips/${k}`)); };
        document.getElementById('addSlip').onclick = () => {
            let a=document.getElementById('appInp').value, c=document.getElementById('codeInp').value, s=document.getElementById('safeSelect').value;
            if(a && c) push(ref(db, 'pro_slips'), {appName:a, code:c, safety:s});
        };
        document.getElementById('addNews').onclick = () => { let t=document.getElementById('newsInput').value; if(t) push(ref(db, 'live_ticker'), {text:t}); };
        window.report = (t, w) => { document.getElementById('feed'+t.charAt(0).toUpperCase()+t.slice(1)).style.display='none'; };
    </script>
</body>
</html>
