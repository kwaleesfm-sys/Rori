<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMOS BET - المنظومة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --primary: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #020617 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background Mesh */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(245, 158, 11, 0.05) 0%, transparent 50%);
            z-index: -1; animation: pulseBg 10s infinite alternate;
        }
        @keyframes pulseBg { 0% { transform: scale(1); } 100% { transform: scale(1.5); } }

        /* Glass Header */
        header { 
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--primary); text-shadow: 0 0 15px rgba(245, 158, 11, 0.5); }

        /* Success Gauge Section */
        .gauge-section {
            background: var(--glass); margin: 20px; padding: 20px; border-radius: 20px;
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border); text-align: center;
        }
        .gauge-container { width: 100%; height: 12px; background: #334155; border-radius: 10px; margin: 15px 0; overflow: hidden; position: relative; }
        #globalGauge { width: 50%; height: 100%; background: linear-gradient(90deg, var(--danger), var(--success)); transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .gauge-labels { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold; }

        /* Tabs */
        .tabs { display: flex; justify-content: center; gap: 15px; padding: 10px; }
        .tab-btn { 
            background: var(--glass); color: var(--text); border: 1px solid var(--glass-border);
            padding: 12px 25px; border-radius: 30px; cursor: pointer; transition: 0.4s;
            backdrop-filter: blur(5px); font-weight: bold;
        }
        .tab-btn.active { background: var(--primary); color: #000; box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }

        .tab-content { display: none; padding: 20px; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Apple Board Glass Design */
        .board { 
            background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 20px; 
            border: 1px solid var(--glass-border); box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .cell { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s; border-radius: 12px;
        }
        .cell.suggested { 
            background: rgba(16, 185, 129, 0.15); border: 2px solid var(--success);
            box-shadow: 0 0 15px var(--success); transform: scale(1.05);
        }

        /* Neon Slips */
        .slip-card { 
            background: var(--glass); border-radius: 15px; padding: 20px;
            margin-bottom: 15px; border: 1px solid var(--glass-border);
            transition: 0.3s; position: relative; overflow: hidden;
        }
        /* 1xbet Glow */
        .slip-card.glow-1xbet { border: 1px solid var(--danger); box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .slip-card.glow-1xbet .copy-btn { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        /* Linebet Glow */
        .slip-card.glow-linebet { border: 1px solid var(--success); box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        .slip-card.glow-linebet .copy-btn { background: var(--success); box-shadow: 0 0 10px var(--success); }

        /* Feedback Buttons */
        .feedback-btns { display: flex; gap: 10px; margin-top: 15px; justify-content: center; display: none; }
        .f-btn { padding: 8px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; }
        .f-win { background: var(--success); color: white; }
        .f-lose { background: var(--danger); color: white; }

        /* Custom Admin Modal */
        .modal-content { background: #1e293b; border: 1px solid var(--primary); box-shadow: 0 0 30px rgba(245, 158, 11, 0.2); }
    </style>
</head>
<body>

    <header>
        <div class="logo">HOMOS <span>BET v2.0</span></div>
        <i class="fas fa-shield-halved admin-gear" id="adminGearBtn"></i>
    </header>

    <!-- Global Success Gauge -->
    <div class="gauge-section">
        <h3 id="systemMsg">تحليل أداء المنظومة الآن...</h3>
        <div class="gauge-container">
            <div id="globalGauge"></div>
        </div>
        <div class="gauge-labels">
            <span style="color: var(--danger)">خسارة ❌</span>
            <span id="gaugePercent">50% جودة</span>
            <span style="color: var(--success)">نجاح ✅</span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-target="apple">🍎 سكرين التفاحة</button>
        <button class="tab-btn" data-target="slips">🎟️ قسائم حصرية</button>
    </div>

    <!-- Apple Screen -->
    <div class="tab-content active" id="apple">
        <div class="generator-box">
            <button class="generate-btn" id="generateBtn" style="background: var(--primary); color: #000; width: 100%; padding: 15px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; margin-bottom: 20px;">
                <i class="fas fa-microchip"></i> تحليل المسار بالذكاء الاصطناعي
            </button>
            <div class="board" id="gameBoard"></div>
            <div class="advice-box" id="adviceBox" style="display: none; margin-top: 20px;"></div>
            
            <div class="feedback-btns" id="appleFeedback">
                <button class="f-btn f-win" onclick="submitFeedback(true)">كسبت ✅</button>
                <button class="f-btn f-lose" onclick="submitFeedback(false)">خسرت ❌</button>
            </div>
        </div>
    </div>

    <!-- Slips Screen -->
    <div class="tab-content" id="slips">
        <div class="slips-container" id="slipsContainer"></div>
    </div>

    <!-- Admin Modal -->
    <div class="modal" id="adminModal">
        <div class="modal-content">
            <h2>إضافة للمنظومة</h2>
            <div class="input-group"><input type="text" id="appNameInput" placeholder="اسم التطبيق (1xbet / Linebet)"></div>
            <div class="input-group"><input type="text" id="slipCodeInput" placeholder="كود القسيمة"></div>
            <button class="submit-btn" id="addSlipBtn">نشر الآن</button>
            <button class="close-modal" id="closeModalBtn">تراجع</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5fbIJ3rbV5Ud1mnQgZGTcjYZSrnQqNbA",
            authDomain: "fir-cb754.firebaseapp.com",
            databaseURL: "https://fir-cb754-default-rtdb.firebaseio.com",
            projectId: "fir-cb754",
            storageBucket: "fir-cb754.firebasestorage.app",
            messagingSenderId: "14696382194",
            appId: "1:14696382194:web:c3879f894094d67eae1a6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const slipsRef = ref(db, 'daily_slips');
        const statsRef = ref(db, 'global_stats');

        // --- Logic: Global Success Gauge ---
        onValue(statsRef, (snap) => {
            const data = snap.val() || { wins: 50, total: 100 };
            const winPercent = Math.round((data.wins / data.total) * 100);
            document.getElementById('globalGauge').style.width = winPercent + '%';
            document.getElementById('gaugePercent').innerText = winPercent + '% قوة المنظومة';
            
            const msg = winPercent > 70 ? "🔥 المنظومة في أعلى مستويات الدقة حالياً" : "⚠️ السيرفر متقلب.. اتبع تعليمات الأمان";
            document.getElementById('systemMsg').innerText = msg;
        });

        window.submitFeedback = async (isWin) => {
            const snap = await get(statsRef);
            let current = snap.val() || { wins: 50, total: 100 };
            update(statsRef, {
                wins: isWin ? current.wins + 1 : current.wins,
                total: current.total + 1
            });
            alert(isWin ? "عاش يا وحش! كمل بتركيز" : "معلش، الخوارزمية هتحسن نفسها الدور الجاي");
            document.getElementById('appleFeedback').style.display = 'none';
        };

        // --- Logic: Tabs ---
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
            }
        });

        // --- Logic: Apple Simulator (AI Feel) ---
        document.getElementById('generateBtn').onclick = () => {
            const btn = document.getElementById('generateBtn');
            const board = document.getElementById('gameBoard');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري اختراق الاحتمالات...';
            
            setTimeout(() => {
                renderAppleBoard();
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> تم استخراج المسار الآمن';
                document.getElementById('appleFeedback').style.display = 'flex';
            }, 1500);
        };

        function renderAppleBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            const config = [1, 1, 1, 1, 2, 2, 2, 3, 3, 4]; // تفاح بايز لكل صف
            
            for (let i = 0; i < 10; i++) {
                const row = document.createElement('div');
                row.className = 'row' + (i > 3 ? ' cell-bad' : ''); // تمييز الصفوف الصعبة
                row.style.display = 'flex'; row.style.gap = '8px'; row.style.marginBottom = '8px';
                
                let cells = new Array(5).fill('🍎');
                let badIdx = [];
                while(badIdx.length < config[i]) {
                    let r = Math.floor(Math.random()*5);
                    if(!badIdx.includes(r)) badIdx.push(r);
                }
                badIdx.forEach(idx => cells[idx] = '🍏');
                
                // اختيار المسار
                let safe = []; cells.forEach((v, idx) => { if(v==='🍎') safe.push(idx)});
                let suggested = safe[Math.floor(Math.random()*safe.length)];

                cells.forEach((val, idx) => {
                    const c = document.createElement('div');
                    c.className = 'cell' + (idx === suggested ? ' suggested' : '');
                    c.style.flex = '1'; c.style.aspectRatio = '1'; c.style.display = 'flex';
                    c.style.alignItems = 'center'; c.style.justifyContent = 'center';
                    c.innerHTML = val;
                    row.appendChild(c);
                });
                board.appendChild(row);
            }
            const advice = document.getElementById('adviceBox');
            advice.className = "advice-box"; advice.style.display = 'block';
            advice.innerHTML = "💡 <b>توجيه المنظومة:</b> المسار الأخضر مضمون لغاية <b>الصف الرابع</b>. اسحب أرباحك فوراً هناك لضمان المكسب.";
        }

        // --- Logic: Slips (Glow Logic) ---
        onValue(slipsRef, (snap) => {
            const container = document.getElementById('slipsContainer');
            container.innerHTML = '';
            const data = snap.val();
            if (data) {
                Object.values(data).reverse().forEach(slip => {
                    const app = slip.appName.toLowerCase();
                    let glowClass = '';
                    if(app.includes('1xbet')) glowClass = 'glow-1xbet';
                    else if(app.includes('linebet')) glowClass = 'glow-linebet';

                    const card = document.createElement('div');
                    card.className = `slip-card ${glowClass}`;
                    card.innerHTML = `
                        <div>
                            <h3 style="margin-bottom:5px;">${slip.appName.toUpperCase()}</h3>
                            <p style="font-size:0.8rem; color:var(--text-muted)">تم التحقق من الكود بنجاح</p>
                        </div>
                        <button class="copy-btn" style="padding:10px 20px; border-radius:10px; border:none; color:white; font-weight:bold; cursor:pointer;" onclick="copyToClipboard('${slip.code}')">
                            ${slip.code} <i class="far fa-copy"></i>
                        </button>
                    `;
                    container.appendChild(card);
                });
            }
        });

        // --- Logic: Admin Gear ---
        document.getElementById('adminGearBtn').onclick = () => {
            if(prompt("كلمة سر المنظومة:") === "homos123") {
                document.getElementById('adminModal').classList.add('active');
            }
        };
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('adminModal').classList.remove('active');
        document.getElementById('addSlipBtn').onclick = async () => {
            const appName = document.getElementById('appNameInput').value;
            const code = document.getElementById('slipCodeInput').value;
            if(appName && code) {
                await push(slipsRef, { appName, code, timestamp: Date.now() });
                document.getElementById('adminModal').classList.remove('active');
                alert("تم النشر في المنظومة!");
            }
        };

        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text);
            alert("تم نسخ الكود: " + text + "\nبالتوفيق يا بطل!");
        };
    </script>
</body>
</html>
