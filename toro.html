<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMOS BET PRO - المنظومة الذكية v4.0</title>
    <!-- مكتبات الخطوط، الأيقونات، وتصوير الشاشة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --glass: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background: #020617;
            background-image: radial-gradient(circle at top right, #1e293b, transparent), radial-gradient(circle at bottom left, #0f172a, transparent);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ticker Bar (شريط الأخبار) */
        .ticker-wrap { background: #000; width: 100%; overflow: hidden; border-bottom: 1px solid var(--glass-border); padding: 8px 0; color: var(--success); font-weight: bold; font-size: 0.85rem; }
        .ticker-move { display: inline-block; white-space: nowrap; padding-right: 100%; animation: scroll-rtl 25s linear infinite; }
        @keyframes scroll-rtl { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }

        /* Header */
        header { 
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000;
        }
        .logo-box h1 { font-size: 1.6rem; font-weight: 900; color: var(--primary); text-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        .logo-box span { font-size: 0.8rem; color: var(--success); display: none; } /* Admin Badge */

        /* Tabs */
        .nav-tabs { display: flex; background: var(--glass); margin: 15px 20px; padding: 6px; border-radius: 50px; border: 1px solid var(--glass-border); }
        .tab-item { flex: 1; text-align: center; padding: 12px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; color: rgba(255,255,255,0.5); }
        .tab-item.active { background: var(--primary); color: #000; }

        .content-sec { display: none; padding: 0 20px 100px; animation: fadeIn 0.4s ease; }
        .content-sec.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Apple Board */
        .apple-board { display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); position: relative; }
        .apple-row { display: grid; grid-template-columns: 45px repeat(5, 1fr); gap: 8px; align-items: center; }
        .multiplier-tag { font-size: 0.75rem; font-weight: 900; color: var(--primary); text-align: center; }
        .apple-cell { aspect-ratio: 1; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: all 0.4s ease; }
        
        /* تأثير الذكاء الاصطناعي أثناء التسلق */
        .apple-cell.highlight { background: rgba(16, 185, 129, 0.15); border: 2px solid var(--success); box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); transform: scale(1.08); }
        .apple-cell.scanning { background: rgba(245, 158, 11, 0.2); box-shadow: 0 0 10px var(--primary); border: 1px dashed var(--primary); }

        /* Console Feed */
        #consoleFeed { background: #000; color: #10b981; font-family: monospace; font-size: 0.8rem; padding: 15px; border-radius: 15px; margin-bottom: 15px; display: none; border: 1px solid #1e293b; text-align: left; direction: ltr; }

        /* Buttons */
        .action-btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        #genBtn { background: var(--primary); color: #000; }
        #exportBtn { background: #fff; color: #000; display: none; box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        /* Admin Controls */
        .admin-panel { display: none; background: rgba(239, 68, 68, 0.05); border: 1px dashed var(--danger); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: none; background: #0f172a; color: #fff; border: 1px solid var(--glass-border); outline: none; }
        .admin-input:focus { border-color: var(--primary); }
    </style>
</head>
<body>

    <!-- 3. شريط الأخبار الذكي -->
    <div class="ticker-wrap">
        <div class="ticker-move" id="tickerUI">
            <!-- سيتم جلب الأخبار من القاعدة هنا -->
            ⚡ جاري الاتصال بخوادم HOMOS BET...
        </div>
    </div>

    <header>
        <div class="logo-box">
            <h1>HOMOS <span>PRO</span></h1>
            <span id="adminBadge"><i class="fas fa-shield-alt"></i> أدمن</span>
        </div>
        <i class="fas fa-fingerprint" id="authBtn" style="font-size: 1.4rem; color: var(--primary); cursor: pointer;"></i>
    </header>

    <div class="nav-tabs">
        <div class="tab-item active" data-sec="apple-logic">🎯 إسكربت التفاحة</div>
        <div class="tab-item" data-sec="admin-vault">⚙️ لوحة التحكم</div>
    </div>

    <!-- Apple Logic Section -->
    <section class="content-sec active" id="apple-logic">
        <button class="action-btn" id="genBtn"><i class="fas fa-microchip"></i> تشغيل خوارزمية الاختراق</button>
        
        <div id="consoleFeed"></div>

        <div class="apple-board" id="boardUI">
            <!-- المربعات سيتم توليدها برمجيا -->
        </div>

        <!-- 2. زر محرك التيك توك -->
        <button class="action-btn" id="exportBtn" style="margin-top: 15px;">
            <i class="fab fa-tiktok"></i> مشاركة الأرباح للإثبات
        </button>
    </section>

    <!-- Admin & Slips Section -->
    <section class="content-sec" id="admin-vault">
        <div id="adminControls" class="admin-panel">
            <h3 style="color: var(--danger); margin-bottom: 15px;"><i class="fas fa-broadcast-tower"></i> بث خبر عاجل بالشريط</h3>
            <input type="text" id="newsInput" class="admin-input" placeholder="مثال: مستخدم من المحلة الكبرى سحب ٤٠٠٠ جنيه الآن">
            <button id="pushNewsBtn" class="action-btn" style="background: var(--danger); color: #fff; padding: 10px;">بث الخبر فوراً</button>
        </div>
        <div id="slipsList">
            <p style="text-align:center; opacity:0.5;">يرجى تسجيل الدخول لعرض وتعديل القسائم.</p>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5fbIJ3rbV5Ud1mnQgZGTcjYZSrnQqNbA",
            authDomain: "fir-cb754.firebaseapp.com",
            databaseURL: "https://fir-cb754-default-rtdb.firebaseio.com",
            projectId: "fir-cb754",
            storageBucket: "fir-cb754.firebasestorage.app",
            messagingSenderId: "14696382194",
            appId: "1:14696382194:web:c3879f894094d67eae1a6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let isAdmin = false;

        // --- نظام الأدمن السري ---
        document.getElementById('authBtn').onclick = () => {
            if(prompt("كود الدخول:") === "Homos77#") {
                isAdmin = true;
                document.getElementById('adminBadge').style.display = 'block';
                document.getElementById('adminControls').style.display = 'block';
                alert("تم تفعيل صلاحيات التحكم بالمنظومة وشريط الأخبار.");
            }
        };

        // --- تبويبات التنقل ---
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab-item, .content-sec').forEach(el => el.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.sec).classList.add('active');
            };
        });

        // --- شريط الأخبار (Live Ticker) ---
        const tickerRef = ref(db, 'live_ticker');
        
        // قراءة الأخبار من القاعدة
        onValue(tickerRef, (snap) => {
            const data = snap.val();
            if(data) {
                let newsString = "";
                // تجميع كل الأخبار في نص واحد للشريط
                Object.values(data).reverse().slice(0, 5).forEach(item => {
                    newsString += `&nbsp;&nbsp;&nbsp;&nbsp; 🔥 ${item.text} &nbsp;&nbsp;&nbsp;&nbsp; | `;
                });
                document.getElementById('tickerUI').innerHTML = newsString;
            }
        });

        // الأدمن يرسل خبر جديد
        document.getElementById('pushNewsBtn').onclick = async () => {
            const text = document.getElementById('newsInput').value;
            if(text) {
                await push(tickerRef, { text: text, time: Date.now() });
                document.getElementById('newsInput').value = '';
                alert("تم بث الخبر لجميع المستخدمين!");
            }
        };

        // --- ذكاء الإسكربت (Apple Logic) ---
        const multipliers = ["x1.23", "x1.54", "x1.93", "x2.41", "x4.02", "x6.71", "x11.18", "x27.9", "x69.8", "x349"];

        function buildBoard() {
            const board = document.getElementById('boardUI');
            board.innerHTML = '';
            // من فوق لتحت (9 لـ 0)
            for (let i = 9; i >= 0; i--) {
                const row = document.createElement('div');
                row.className = 'apple-row';
                row.id = `row-${i}`;
                row.innerHTML = `<div class="multiplier-tag">${multipliers[i]}</div>`;
                for (let j = 0; j < 5; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'apple-cell';
                    cell.id = `cell-${i}-${j}`;
                    row.appendChild(cell);
                }
                board.appendChild(row);
            }
        }
        buildBoard();

        document.getElementById('genBtn').onclick = () => {
            const btn = document.getElementById('genBtn');
            const consoleBox = document.getElementById('consoleFeed');
            const exportBtn = document.getElementById('exportBtn');
            
            btn.disabled = true;
            exportBtn.style.display = 'none';
            buildBoard(); // تصفير البوردة
            
            consoleBox.style.display = 'block';
            consoleBox.innerHTML = "init() >> Bypass RNG Seed...<br>";

            // محاكاة تسلق الذكاء الاصطناعي للأدوار من الأسفل (0) للأعلى (9)
            let currentLevel = 0;
            const climbInterval = setInterval(() => {
                if(currentLevel > 9) {
                    clearInterval(climbInterval);
                    consoleBox.innerHTML += "> <span style='color:var(--success)'>[Success] Path Extracted!</span>";
                    btn.disabled = false;
                    exportBtn.style.display = 'block'; // إظهار زر التيك توك
                    return;
                }

                consoleBox.innerHTML += `> Analyzing MD5 Hash for Level ${currentLevel + 1}...<br>`;
                
                // اختيار مسار آمن
                const safeCol = Math.floor(Math.random() * 5);
                const targetCell = document.getElementById(`cell-${currentLevel}-${safeCol}`);
                
                // تأثير بصري
                targetCell.classList.add('highlight');
                targetCell.innerHTML = '🍏'; // يبدأ بتفاحة خضراء
                
                // بعد لحظة يحولها لتفاحة حمراء عشان يحسس المستخدم بالاختراق
                setTimeout(() => {
                    targetCell.innerHTML = '🍎';
                    targetCell.style.boxShadow = "0 0 20px var(--success)";
                }, 200);

                currentLevel++;
            }, 600); // بين كل دور والتاني 600 جزء من الثانية
        };

        // --- محرك مشاركة التيك توك (TikTok Exporter) ---
        document.getElementById('exportBtn').onclick = () => {
            const btn = document.getElementById('exportBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تجهيز الصورة...';
            
            const boardToCapture = document.getElementById('boardUI');
            
            // إضافة علامة مائية للموقع مؤقتا قبل التصوير
            const watermark = document.createElement('div');
            watermark.innerHTML = "<b>HOMOS BET SYSTEM</b><br>@2026 الاختراق الناجح";
            watermark.style.cssText = "text-align:center; color:var(--primary); margin-top:10px; font-size:1.2rem; font-weight:900;";
            boardToCapture.appendChild(watermark);

            // استخدام مكتبة التصوير
            html2canvas(boardToCapture, {
                backgroundColor: '#020617',
                scale: 2 // لرفع جودة الصورة
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `HOMOS_WIN_${Date.now()}.png`; // اسم الصورة
                link.href = canvas.toDataURL("image/png");
                link.click(); // تحميل مباشر
                
                // إزالة العلامة المائية بعد التصوير
                boardToCapture.removeChild(watermark);
                btn.innerHTML = '<i class="fab fa-tiktok"></i> تم التحميل! شاركها الآن';
                
                setTimeout(() => {
                    btn.innerHTML = '<i class="fab fa-tiktok"></i> مشاركة الأرباح للإثبات';
                }, 3000);
            });
        };
    </script>
</body>
</html>
