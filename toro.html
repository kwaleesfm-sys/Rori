<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMOS Football Universe</title>
    <style>
        /* === تصميم عصري جداً (Neon/Dark Theme) === */
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary-neon: #0ea5e9;
            --success-neon: #10b981;
            --danger-neon: #ef4444;
            --text-main: #f8fafc;
            --h-gems: #f59e0b;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Navbar */
        header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-neon);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
        }

        .brand h1 {
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary-neon);
        }

        .user-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .h-gems-display {
            background: rgba(245, 158, 11, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--h-gems);
            font-weight: bold;
            color: var(--h-gems);
        }

        /* Layout */
        .container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 80px);
        }

        /* Sidebar: Market & Admin */
        .sidebar {
            background: var(--panel-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #334155;
            overflow-y: auto;
        }

        .panel-title {
            color: var(--primary-neon);
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .market-item {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid var(--success-neon);
            transition: 0.3s;
        }

        .market-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2);
        }

        button {
            background: var(--primary-neon);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: #0284c7;
            box-shadow: 0 0 10px var(--primary-neon);
        }

        /* Main Arena (Pitch & Commentary) */
        .arena {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .pitch {
            background: #15803d;
            height: 200px;
            border-radius: 10px;
            position: relative;
            border: 2px solid white;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .pitch::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: white;
            transform: translateX(-50%);
        }

        .pitch::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: 50px;
            height: 50px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .ball {
            width: 15px;
            height: 15px;
            background: white;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .commentary-box {
            background: var(--panel-bg);
            flex-grow: 1;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #334155;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
        }

        .log-entry {
            padding: 10px;
            border-bottom: 1px solid #334155;
            animation: fadeIn 0.3s ease-in;
        }

        .log-goal { color: var(--success-neon); font-weight: bold; font-size: 1.1em; }
        .log-attack { color: var(--primary-neon); }
        .log-defend { color: var(--h-gems); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Admin Controls */
        .admin-zone {
            display: none; /* مخفي افتراضياً، يظهر للإدمن فقط */
            margin-top: 20px;
            padding: 15px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px dashed var(--danger-neon);
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }

        /* Scoreboard */
        .scoreboard {
            display: flex;
            justify-content: space-around;
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            border: 1px solid var(--primary-neon);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <h1>HOMOS FC ⚡</h1>
        </div>
        <div class="user-stats">
            <span id="userBadge">🏅 النادي الصاعد</span>
            <span class="h-gems-display">💎 <span id="hGemsAmount">500</span> H-Gems</span>
            <button onclick="claimDaily()" style="width: auto; margin:0;" id="dailyBtn">🎁 مكافأة يومية</button>
        </div>
    </header>

    <div class="container">
        <div class="sidebar">
            <h2 class="panel-title">🛒 سوق الانتقالات</h2>
            <div id="marketList">
                </div>

            <div class="admin-zone" id="adminZone">
                <h3 style="color: var(--danger-neon); margin-top: 0;">لوحة تحكم الإدمن</h3>
                <input type="text" id="addName" placeholder="اسم اللاعب">
                <input type="number" id="addAttack" placeholder="قوة الهجوم (1-100)">
                <input type="number" id="addPrice" placeholder="السعر (H-Gems)">
                <button style="background: var(--danger-neon);" onclick="adminAddPlayer()">إضافة للسوق</button>
            </div>
        </div>

        <div class="arena">
            <div class="scoreboard">
                <span id="homeScoreName">نادي HOMOS</span>
                <span><span id="scoreHome">0</span> - <span id="scoreAway">0</span></span>
                <span>نادي البوت الذكي</span>
            </div>

            <div class="pitch">
                <div class="ball" id="matchBall"></div>
            </div>

            <button onclick="startMatchEngine()" id="startMatchBtn" style="font-size: 18px; padding: 15px;">▶ بدء مباراة جديدة ضد البوت</button>

            <div class="commentary-box" id="commentaryBox">
                <div style="color: #64748b; text-align: center;">التعليق المباشر سيظهر هنا...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIhi7idSY3-bkA5L4tdOPo1m_AvDl0pr4",
            authDomain: "chatlyo.firebaseapp.com",
            databaseURL: "https://chatlyo-default-rtdb.firebaseio.com",
            projectId: "chatlyo",
            storageBucket: "chatlyo.firebasestorage.app",
            messagingSenderId: "511307142502",
            appId: "1:511307142502:web:57c8390b3b10aebf1464a7",
            measurementId: "G-4E7GLHFB47"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // ==========================================
        // اللوجيك الأساسي للعبة (The Logic Engine)
        // ==========================================

        let userHGems = 500;
        const currentUserEmail = "ahmedfouad01278837444@gmail.com"; // محاكاة تسجيل الدخول الحالي
        
        // إظهار لوحة الإدمن لأحمد
        if(currentUserEmail === "ahmedfouad01278837444@gmail.com") {
            document.getElementById('adminZone').style.display = 'block';
        }

        // 1. نظام السوق والعناصر المبتكرة
        const marketItems = [
            { id: 'p1', name: 'لاعب هجوم سوبر', attack: 95, defense: 30, price: 300, type: 'player' },
            { id: 'p2', name: 'مدافع صلب', attack: 20, defense: 92, price: 250, type: 'player' },
            { id: 'item1', name: 'جرعة رئة نقية 🫁', desc: 'استعادة كاملة للياقة الفريق', price: 100, type: 'boost' }
        ];

        function renderMarket() {
            const marketDiv = document.getElementById('marketList');
            marketDiv.innerHTML = '';
            marketItems.forEach(item => {
                let btnText = item.type === 'player' ? 'شراء اللاعب' : 'شراء الجرعة';
                let statsText = item.type === 'player' ? `هجوم: ${item.attack} | دفاع: ${item.defense}` : item.desc;
                marketDiv.innerHTML += `
                    <div class="market-item">
                        <h4 style="margin: 0 0 5px 0;">${item.name}</h4>
                        <p style="font-size: 12px; color: #94a3b8; margin: 0 0 10px 0;">${statsText}</p>
                        <button onclick="buyItem(${item.price})">💎 ${item.price} - ${btnText}</button>
                    </div>
                `;
            });
        }
        renderMarket();

        window.buyItem = function(price) {
            if(userHGems >= price) {
                userHGems -= price;
                updateGemsUI();
                alert("تم الشراء بنجاح! تم الإضافة للنادي.");
            } else {
                alert("رصيد H-Gems غير كافي!");
            }
        }

        window.claimDaily = function() {
            userHGems += 50;
            updateGemsUI();
            document.getElementById('dailyBtn').style.display = 'none';
            alert("تم استلام 50 H-Gems بنجاح!");
        }

        function updateGemsUI() {
            document.getElementById('hGemsAmount').innerText = userHGems;
        }

        window.adminAddPlayer = function() {
            const name = document.getElementById('addName').value;
            const attack = document.getElementById('addAttack').value;
            const price = document.getElementById('addPrice').value;
            if(name && attack && price) {
                marketItems.push({ id: 'new', name: name, attack: parseInt(attack), defense: 40, price: parseInt(price), type: 'player' });
                renderMarket();
                alert("تم رفع اللاعب لـ Firebase بنجاح (Simulation)");
            }
        }

        // ==========================================
        // محرك المباراة المتقدم (Advanced Match Engine)
        // ==========================================

        class MatchEngine {
            constructor() {
                this.minute = 0;
                this.score = { home: 0, away: 0 };
                this.ballZone = 2; // 1: دفاع, 2: وسط, 3: هجوم
                this.possession = 'home';
                
                // إضافة ميزة التناغم (Chemistry Bonus)
                this.homePower = { attack: 85 * 1.15, defense: 75 }; // 15% زيادة بسبب تناغم التشكيلة
                this.awayPower = { attack: 70, defense: 70 }; // البوت
                
                this.ballElement = document.getElementById('matchBall');
                this.box = document.getElementById('commentaryBox');
                this.interval = null;
            }

            log(msg, type = '') {
                this.box.innerHTML += `<div class="log-entry ${type}">[د ${this.minute}] ⚽ ${msg}</div>`;
                this.box.scrollTop = this.box.scrollHeight;
            }

            moveBallUI() {
                // تحريك الكورة بناءً على الـ Zone ومين معاه الكورة
                let leftPos = '50%';
                if(this.ballZone === 1) leftPos = this.possession === 'home' ? '20%' : '80%';
                if(this.ballZone === 3) leftPos = this.possession === 'home' ? '80%' : '20%';
                this.ballElement.style.left = leftPos;
            }

            simulate() {
                this.minute += 3; // تسريع الوقت
                
                let attacker = this.possession === 'home' ? this.homePower : this.awayPower;
                let defender = this.possession === 'home' ? this.awayPower : this.homePower;
                let attackerName = this.possession === 'home' ? 'نادي HOMOS' : 'البوت';
                let defenderName = this.possession === 'home' ? 'البوت' : 'نادي HOMOS';

                if (this.ballZone === 2) {
                    if (Math.random() * (attacker.attack + defender.defense) <= attacker.attack) {
                        this.log(`تمريرات دقيقة وتناغم عالي من ${attackerName} في نص الملعب!`, 'log-attack');
                        this.ballZone = 3;
                    } else {
                        this.log(`قطع قوي للكورة من ${defenderName}.`, 'log-defend');
                        this.possession = this.possession === 'home' ? 'away' : 'home';
                    }
                } 
                else if (this.ballZone === 3) {
                    this.log(`هجمة خطيرة لـ ${attackerName} وتسديدة صاروخية!`, 'log-attack');
                    if (Math.random() * (attacker.attack * 0.8 + defender.defense * 1.2) <= attacker.attack * 0.8) {
                        this.log(`جووووووول! هدف عالمي لـ ${attackerName} 🔥`, 'log-goal');
                        if (this.possession === 'home') this.score.home++;
                        else this.score.away++;
                        
                        document.getElementById('scoreHome').innerText = this.score.home;
                        document.getElementById('scoreAway').innerText = this.score.away;
                        
                        this.ballZone = 2;
                        this.possession = this.possession === 'home' ? 'away' : 'home';
                    } else {
                        this.log(`يا رباااه! الحارس ينقذ الموقف ببراعة.`);
                        this.ballZone = 2;
                        this.possession = this.possession === 'home' ? 'away' : 'home';
                    }
                }
                
                this.moveBallUI();

                if (this.minute >= 90) {
                    clearInterval(this.interval);
                    this.log(`نهاية المباراة! النتيجة ${this.score.home} - ${this.score.away}`);
                    if(this.score.home > this.score.away) {
                        this.log(`مبروك! فوز مستحق وتم إضافة 100 H-Gems لحسابك.`, 'log-goal');
                        userHGems += 100;
                        updateGemsUI();
                        document.getElementById('startMatchBtn').disabled = false;
                    } else {
                        document.getElementById('startMatchBtn').disabled = false;
                    }
                }
            }

            start() {
                this.box.innerHTML = '';
                document.getElementById('scoreHome').innerText = '0';
                document.getElementById('scoreAway').innerText = '0';
                document.getElementById('startMatchBtn').disabled = true;
                
                this.log(`بداية المباراة! تناغم فريق HOMOS في أعلى مستوياته.`);
                this.interval = setInterval(() => this.simulate(), 800); // تحديث كل أقل من ثانية
            }
        }

        window.startMatchEngine = function() {
            const match = new MatchEngine();
            match.start();
        }
    </script>
</body>
</html>
