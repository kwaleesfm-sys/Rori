<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMOS Football Universe</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --neon-green: #39ff14;
            --neon-blue: #0ff;
            --card-bg: #1a1a2e;
            --text-main: #e6edf3;
            --pitch-green: #2b7a0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(90deg, #000, #111);
            border-bottom: 2px solid var(--neon-blue);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        header h1 {
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            font-size: 1.5rem;
        }

        .user-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .gems {
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 5px #ffd700;
        }

        .badges {
            display: flex;
            gap: 5px;
        }

        .badge {
            background: #ff4500;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 0 8px #ff4500;
        }

        button {
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .btn-green {
            color: var(--neon-green);
            border-color: var(--neon-green);
        }
        
        .btn-green:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 10px var(--neon-green);
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .section {
            display: none;
            animation: fadeIn 0.5s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Pitch & Squad */
        .pitch-container {
            width: 100%;
            max-width: 800px;
            height: 500px;
            background: linear-gradient(180deg, #1b4d06, var(--pitch-green));
            margin: 0 auto;
            border: 3px solid #fff;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--neon-green);
            overflow: hidden;
        }

        .pitch-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }
        .pitch-lines::before { /* Center Circle */
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }
        .pitch-lines::after { /* Center Line */
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
        }

        .squad-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-content: space-around;
            padding: 20px;
        }

        /* Player Card */
        .player-card {
            background: linear-gradient(135deg, #2a2a4a, var(--card-bg));
            border: 2px solid #b8860b;
            border-radius: 10px;
            width: 120px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            position: relative;
            transition: 0.3s;
            z-index: 10;
        }

        .player-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #b8860b;
        }

        .card-rating {
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd700;
        }

        .card-pos {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 0.8rem;
            color: var(--neon-blue);
        }

        .card-name {
            margin-top: 25px;
            font-size: 1rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-stats {
            font-size: 0.7rem;
            margin-top: 5px;
            color: #aaa;
        }

        .card-stamina {
            width: 100%;
            height: 4px;
            background: #555;
            margin-top: 5px;
            border-radius: 2px;
        }

        .card-stamina-fill {
            height: 100%;
            background: var(--neon-green);
            width: 100%;
        }

        /* Market */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .market-card {
            background: #1e1e30;
            border: 1px solid var(--neon-blue);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        /* Match Simulation */
        .match-screen {
            text-align: center;
            background: #111;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--neon-green);
        }
        
        .score-board {
            font-size: 3rem;
            font-weight: bold;
            margin: 20px 0;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
        }

        .commentary-box {
            background: #000;
            border: 1px solid #444;
            height: 200px;
            overflow-y: auto;
            padding: 15px;
            text-align: right;
            margin-top: 20px;
            font-size: 1.1rem;
            color: var(--neon-blue);
            line-height: 1.6;
        }

        /* Admin */
        .admin-panel {
            background: #331111;
            border: 2px solid #ff4444;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .admin-panel input {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: none;
            background: #222;
            color: #fff;
        }

        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h1 style="color: var(--neon-green); margin-bottom: 20px; font-size: 2.5rem; text-shadow: 0 0 20px var(--neon-green);">HOMOS Football Universe</h1>
        <p style="margin-bottom: 30px; font-size: 1.2rem;">أهلاً بيك يا عالمي في أقوى لعبة كورة .. ادخل وورينا مهاراتك!</p>
        <button id="btn-login" style="font-size: 1.2rem; padding: 15px 30px;">سجل دخول يا بطل (Google)</button>
    </div>

    <div id="main-game" class="hidden">
        <header>
            <h1>HOMOS Universe</h1>
            <div class="user-info">
                <div class="badges" id="user-badges"></div>
                <div class="gems" id="user-gems">💎 0 H-Gems</div>
                <button id="btn-daily-bonus" class="btn-green">خد هديتك اليومية 🎁</button>
                <button id="btn-logout">اخرج يا كابتن</button>
            </div>
        </header>

        <nav>
            <button class="nav-btn" data-target="squad-section">التشكيلة بتاعتك</button>
            <button class="nav-btn" data-target="market-section">سوق الانتقالات</button>
            <button class="nav-btn" data-target="match-section">إلعب ماتش</button>
            <button id="nav-admin" class="nav-btn hidden" data-target="admin-section" style="color:#ff4444; border-color:#ff4444;">السبوبة (لوحة الإدارة)</button>
        </nav>

        <div class="container">
            <div id="squad-section" class="section active">
                <h2 style="margin-bottom: 15px; text-align:center;">تشكيلة الرعب <span id="chem-status" style="font-size:1rem; color:var(--neon-green);"></span></h2>
                <div style="text-align:center; margin-bottom: 10px;">
                    <button id="btn-heal" class="btn-green">ريّح اللعيبة (Stamina +100) بـ 20 جوهرة</button>
                </div>
                <div class="pitch-container">
                    <div class="pitch-lines"></div>
                    <div class="squad-grid" id="squad-container">
                        </div>
                </div>
            </div>

            <div id="market-section" class="section">
                <h2 style="margin-bottom: 15px; text-align:center;">المتجر العالمي - اشتري نجوم</h2>
                <div class="market-grid" id="market-container">
                    </div>
            </div>

            <div id="match-section" class="section">
                <div class="match-screen">
                    <h2>الماتش الحاسم</h2>
                    <p style="margin-top: 10px;">فريقك <span style="color:var(--neon-green)">ضد</span> فريق الذكاء الاصطناعي</p>
                    <div class="score-board" id="score-board">0 - 0</div>
                    <button id="btn-start-match" style="font-size: 1.2rem; padding: 10px 20px;">صفّر يا حكم (ابدأ الماتش)</button>
                    <div class="commentary-box" id="commentary-box">
                        أهلاً بيك في استاد HOMOS! مستنيين الماتش يبدأ...
                    </div>
                </div>
            </div>

            <div id="admin-section" class="section admin-panel">
                <h2>إضافة لعيب للسوق (للأدمن بس)</h2>
                <input type="text" id="add-name" placeholder="اسم اللعيب (عربي/إنجليزي)">
                <input type="text" id="add-pos" placeholder="المركز (ST, CM, CB, GK, RW)">
                <input type="number" id="add-rating" placeholder="التقييم (مثلا 90)">
                <input type="number" id="add-atk" placeholder="الهجوم (0-100)">
                <input type="number" id="add-def" placeholder="الدفاع (0-100)">
                <input type="number" id="add-price" placeholder="السعر (H-Gems)">
                <button id="btn-add-player" style="border-color:var(--neon-green); color:var(--neon-green);">نزّل اللعيب السوق</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, addDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIhi7idSY3-bkA5L4tdOPo1m_AvDl0pr4",
            authDomain: "chatlyo.firebaseapp.com",
            projectId: "chatlyo",
            storageBucket: "chatlyo.firebasestorage.app",
            messagingSenderId: "511307142502",
            appId: "1:511307142502:web:57c8390b3b10aebf1464a7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = null;
        let globalMarket = [];

        // UI Elements
        const loginScreen = document.getElementById('login-screen');
        const mainGame = document.getElementById('main-game');
        const userGemsEl = document.getElementById('user-gems');
        const userBadgesEl = document.getElementById('user-badges');
        const squadContainer = document.getElementById('squad-container');
        const marketContainer = document.getElementById('market-container');
        const chemStatus = document.getElementById('chem-status');
        
        // Navigation Logic
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
                document.getElementById(e.target.dataset.target).classList.add('active');
            });
        });

        // Authentication
        document.getElementById('btn-login').addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch(error => alert("حصلت مشكلة في تسجيل الدخول يا كابتن!"));
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loginScreen.classList.add('hidden');
                mainGame.classList.remove('hidden');
                
                // Check Admin
                if(user.email === 'ahmedfouad01278837444@gmail.com') {
                    document.getElementById('nav-admin').classList.remove('hidden');
                }

                await initUserData(user);
                listenToMarket();
            } else {
                currentUser = null;
                loginScreen.classList.remove('hidden');
                mainGame.classList.add('hidden');
            }
        });

        // Initialize/Fetch User Data
        async function initUserData(user) {
            const userRef = doc(db, 'Users', user.uid);
            const userSnap = await getDoc(userRef);
            
            if (!userSnap.exists()) {
                userData = {
                    name: user.displayName,
                    gems: 200,
                    squad: [],
                    friends: [],
                    lastDailyBonus: 0,
                    matchesPlayed: 0
                };
                await setDoc(userRef, userData);
            } else {
                userData = userSnap.data();
            }
            updateUI();
        }

        // Daily Bonus (Feature 1)
        document.getElementById('btn-daily-bonus').addEventListener('click', async () => {
            const now = new Date().getTime();
            const oneDay = 24 * 60 * 60 * 1000;
            if (now - userData.lastDailyBonus > oneDay) {
                userData.gems += 50;
                userData.lastDailyBonus = now;
                await updateDoc(doc(db, 'Users', currentUser.uid), {
                    gems: userData.gems,
                    lastDailyBonus: userData.lastDailyBonus
                });
                alert("عاش! استلمت الـ 50 جوهرة بتوع النهاردة.");
                updateUI();
            } else {
                alert("يا بطل انت استلمت الهدية بتاعتك.. جرب بكرا!");
            }
        });

        // Restore Stamina
        document.getElementById('btn-heal').addEventListener('click', async () => {
            if(userData.gems >= 20 && userData.squad.length > 0) {
                userData.gems -= 20;
                userData.squad = userData.squad.map(p => ({...p, stamina: 100}));
                await updateDoc(doc(db, 'Users', currentUser.uid), {
                    gems: userData.gems,
                    squad: userData.squad
                });
                alert("اللعيبة ضربت شاورما ورجعت فورمة!");
                updateUI();
            } else if (userData.gems < 20) {
                alert("معكش جواهر كفاية يا كابتن!");
            } else {
                alert("مفيش لعيبة في التشكيلة أصلاً!");
            }
        });

        // Real-Time Market (Feature 4)
        function listenToMarket() {
            onSnapshot(collection(db, 'Market'), (snapshot) => {
                globalMarket = [];
                snapshot.forEach(doc => {
                    globalMarket.push({ id: doc.id, ...doc.data() });
                });
                renderMarket();
            });
        }

        function updateUI() {
            userGemsEl.innerText = `💎 ${userData.gems} H-Gems`;
            
            // Achievement Badges (Feature 5)
            userBadgesEl.innerHTML = '';
            if(userData.squad.length >= 5) {
                userBadgesEl.innerHTML += `<span class="badge" title="تشكيلتك قوية">👑 King of Market</span>`;
            }
            if(userData.matchesPlayed >= 5) {
                userBadgesEl.innerHTML += `<span class="badge" style="background:#00f">🔥 Unstoppable</span>`;
            }

            renderSquad();
        }

        // Squad Rendering & Chemistry (Feature 2) & Fatigue (Feature 3)
        function renderSquad() {
            squadContainer.innerHTML = '';
            if(userData.squad.length === 0) {
                squadContainer.innerHTML = '<p style="color:#fff; text-align:center; width:100%; margin-top:200px; font-size:1.5rem;">روح السوق اشتري لعيبة يا كابتن!</p>';
                chemStatus.innerText = '';
                return;
            }

            // Chemistry logic: If 5 players, +10% boost indicator
            if(userData.squad.length >= 5) {
                chemStatus.innerText = "(تناغم الفريق عالي: +10% قوة ⚡)";
            } else {
                chemStatus.innerText = "(ناقصك لعيبة للتناغم)";
            }

            userData.squad.forEach(player => {
                const staminaColor = player.stamina > 50 ? 'var(--neon-green)' : (player.stamina > 20 ? 'orange' : 'red');
                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = `
                    <div class="card-rating">${player.rating}</div>
                    <div class="card-pos">${player.pos}</div>
                    <div class="card-name">${player.name}</div>
                    <div class="card-stats">هجوم: ${player.atk} | دفاع: ${player.def}</div>
                    <div class="card-stamina" title="اللياقة: ${player.stamina}%">
                        <div class="card-stamina-fill" style="width: ${player.stamina}%; background: ${staminaColor};"></div>
                    </div>
                `;
                squadContainer.appendChild(card);
            });
        }

        // Market Rendering
        function renderMarket() {
            marketContainer.innerHTML = '';
            globalMarket.forEach(player => {
                const isOwned = userData && userData.squad.some(p => p.marketId === player.id);
                const div = document.createElement('div');
                div.className = 'market-card player-card';
                div.style.margin = "0 auto";
                div.innerHTML = `
                    <div class="card-rating">${player.rating}</div>
                    <div class="card-pos">${player.pos}</div>
                    <div class="card-name">${player.name}</div>
                    <div class="card-stats">هجوم: ${player.atk} | دفاع: ${player.def}</div>
                    <div style="margin-top: 15px; font-weight:bold; color:#ffd700;">${player.price}💎</div>
                    <button class="buy-btn" style="margin-top:10px; width:100%;" ${isOwned ? 'disabled' : ''}>
                        ${isOwned ? 'عندك في الفريق' : 'إشتري'}
                    </button>
                `;
                
                if(!isOwned) {
                    div.querySelector('.buy-btn').addEventListener('click', () => buyPlayer(player));
                }
                marketContainer.appendChild(div);
            });
        }

        async function buyPlayer(player) {
            if(userData.gems >= player.price) {
                if(userData.squad.length >= 5) {
                    alert("التشكيلة بتاعتك مليانة! الماكس 5 لعيبة (خماسي).");
                    return;
                }
                userData.gems -= player.price;
                const newPlayer = {
                    marketId: player.id,
                    name: player.name,
                    pos: player.pos,
                    rating: player.rating,
                    atk: player.atk,
                    def: player.def,
                    stamina: 100 // Full stamina on purchase
                };
                userData.squad.push(newPlayer);
                
                await updateDoc(doc(db, 'Users', currentUser.uid), {
                    gems: userData.gems,
                    squad: userData.squad
                });
                alert(`مبروك يا بطل! ${player.name} بقى معاك في التشكيلة.`);
                updateUI();
                renderMarket(); // update button states
            } else {
                alert("معكش فلوس كفاية يا كابتن! استنى الهدية اليومية.");
            }
        }

        // Match Engine Logic
        document.getElementById('btn-start-match').addEventListener('click', startMatch);

        async function startMatch() {
            if(!userData || userData.squad.length < 1) {
                alert("انزل الملعب إزاي ومفيش لعيبة؟ روح المتجر الأول!");
                return;
            }

            const btn = document.getElementById('btn-start-match');
            btn.disabled = true;
            btn.innerText = "الماتش شغال...";
            
            const commBox = document.getElementById('commentary-box');
            commBox.innerHTML = '';

            const addComment = (text, delay) => {
                setTimeout(() => {
                    commBox.innerHTML += `<p>⚽ ${text}</p>`;
                    commBox.scrollTop = commBox.scrollHeight;
                }, delay);
            };

            // Calculate Team Power
            let teamAtk = 0;
            let teamDef = 0;
            
            userData.squad.forEach(p => {
                // Fatigue penalty (if stamina < 50, stats drop by 20%)
                let multiplier = p.stamina < 50 ? 0.8 : 1.0;
                teamAtk += (p.atk * multiplier);
                teamDef += (p.def * multiplier);
            });

            // Chemistry boost (+10%)
            if(userData.squad.length >= 5) {
                teamAtk *= 1.1;
                teamDef *= 1.1;
            }

            // Bot stats (Random scale based on user level to make it fair but challenging)
            const botAtk = Math.floor(Math.random() * (teamDef + 50)) + (teamDef * 0.5);
            const botDef = Math.floor(Math.random() * (teamAtk + 50)) + (teamAtk * 0.5);

            addComment("بسم الله، الحكم بيصفر والماتش بيبدأ في أجواء عالمية!", 1000);
            addComment("فريقك نازل وعينه على المكسب...", 2500);

            let myScore = 0;
            let botScore = 0;
            const scoreEl = document.getElementById('score-board');
            scoreEl.innerText = "0 - 0";

            // Event 1: User Attack
            setTimeout(() => {
                addComment("هجمة خطيرة لفريقك، باص حلو أوي...", 4000);
                setTimeout(() => {
                    const chance = (teamAtk / (teamAtk + botDef)) * 100;
                    const roll = Math.random() * 100;
                    if(roll < chance) {
                        myScore++;
                        scoreEl.innerText = `${myScore} - ${botScore}`;
                        addComment("جوووووول! ايه الحلاوة دي! صاروخ في المقص يا لعيب!", 0);
                    } else {
                        addComment("يا خسارة! الكورة في السما، هجمة ضاعت بعبط.", 0);
                    }
                }, 1500);
            }, 4000);

            // Event 2: Bot Attack
            setTimeout(() => {
                addComment("الخصم بيبني هجمة مرتدة سريعة...", 8000);
                setTimeout(() => {
                    const chance = (botAtk / (botAtk + teamDef)) * 100;
                    const roll = Math.random() * 100;
                    if(roll < chance) {
                        botScore++;
                        scoreEl.innerText = `${myScore} - ${botScore}`;
                        addComment("دفاعك شوارع يا كابتن! الخصم جاب جون فينا بسهولة.", 0);
                    } else {
                        addComment("عاش الدفاع! قطع الكورة بامتياز وقفل المساحات.", 0);
                    }
                }, 1500);
            }, 8000);

            // Event 3: Final push
            setTimeout(() => {
                addComment("الدقيقة 90 والكل على أعصابه...", 12000);
                setTimeout(() => {
                    const chance = (teamAtk / (teamAtk + botDef + 20)) * 100; // Harder at the end
                    const roll = Math.random() * 100;
                    if(roll < chance) {
                        myScore++;
                        scoreEl.innerText = `${myScore} - ${botScore}`;
                        addComment("جوووول قاتل! هدف بـ 3 نقط يقلب الموازين!", 0);
                    } else {
                        addComment("فرصة بتضيع في آخر ثانية... الحكم بيبص في ساعته.", 0);
                    }
                }, 1500);
            }, 12000);

            // Match End Logic
            setTimeout(async () => {
                addComment(`نهاية الماتش بنتيجة ${myScore} - ${botScore}.`, 16000);
                
                let gemReward = 0;
                if(myScore > botScore) {
                    addComment("عاش يا وحش! كسبت الماتش ونورت الدنيا وخدت 30 H-Gems.", 16500);
                    gemReward = 30;
                } else if (myScore === botScore) {
                    addComment("تعادل عادل! استلم 10 H-Gems.", 16500);
                    gemReward = 10;
                } else {
                    addComment("هارد لك يا كابتن.. محتاجين نظبط التشكيلة شوية. خد 5 H-Gems ترضية.", 16500);
                    gemReward = 5;
                }

                // Update Stats (Fatigue & Rewards)
                userData.gems += gemReward;
                userData.matchesPlayed = (userData.matchesPlayed || 0) + 1;
                
                // Reduce Stamina by 15 per match
                userData.squad = userData.squad.map(p => {
                    p.stamina = Math.max(0, p.stamina - 15);
                    return p;
                });

                await updateDoc(doc(db, 'Users', currentUser.uid), {
                    gems: userData.gems,
                    matchesPlayed: userData.matchesPlayed,
                    squad: userData.squad
                });

                updateUI();
                btn.disabled = false;
                btn.innerText = "صفّر يا حكم (ابدأ الماتش)";
            }, 16000);
        }

        // Admin functionality
        document.getElementById('btn-add-player').addEventListener('click', async () => {
            const name = document.getElementById('add-name').value;
            const pos = document.getElementById('add-pos').value.toUpperCase();
            const rating = parseInt(document.getElementById('add-rating').value);
            const atk = parseInt(document.getElementById('add-atk').value);
            const def = parseInt(document.getElementById('add-def').value);
            const price = parseInt(document.getElementById('add-price').value);

            if(!name || !pos || !rating || !atk || !def || !price) {
                alert("املى كل البيانات يا ريس!");
                return;
            }

            try {
                await addDoc(collection(db, 'Market'), {
                    name, pos, rating, atk, def, price
                });
                alert("تم إضافة اللعيب للسوق بنجاح يا ريس!");
                
                // Clear fields
                document.getElementById('add-name').value = '';
                document.getElementById('add-pos').value = '';
                document.getElementById('add-rating').value = '';
                document.getElementById('add-atk').value = '';
                document.getElementById('add-def').value = '';
                document.getElementById('add-price').value = '';
            } catch (error) {
                console.error("Error adding player:", error);
                alert("حصلت مشكلة في الإضافة.");
            }
        });

    </script>
</body>
</html>
